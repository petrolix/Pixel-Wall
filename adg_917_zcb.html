<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Wall - Admin Suite</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box; touch-action: none; }
        body { 
            overflow:hidden; background:#0a0a0a; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            display: flex; flex-direction: column; height: 100vh;
            position: fixed; width: 100%; 
        }

        header {
            background: #1a1a1a; color: white; padding: 8px 15px;
            display: flex; flex-direction: column; gap: 8px;
            border-bottom: 2px solid #d4a017; z-index: 10000;
        }

        .top-row { display: flex; align-items: center; justify-content: space-between; width: 100%; flex-wrap: wrap; gap: 10px; }
        .stats-row { 
            display: flex; align-items: center; justify-content: space-between; width: 100%;
            font-family: monospace; font-size: 11px; color: #888; 
            background: #000; padding: 5px 12px; border-radius: 6px; border: 1px solid #222;
        }
        
        .controls-group { display: flex; align-items: center; gap: 10px; }
        .mode-toggle { display: flex; background: #000; padding: 2px; border-radius: 8px; border: 1px solid #444; }
        .mode-btn {
            background: transparent; color: #666; border: none; padding: 6px 10px;
            border-radius: 6px; cursor: pointer; font-size: 10px; font-weight: bold;
        }
        .mode-btn.active { background: #333; color: #d4a017; }

        /* UI SELEZIONE & ADMIN */
        #adminArea { display: none; align-items: center; gap: 10px; }
        #selectionUI { 
            display: none; align-items: center; gap: 6px; 
            background: #252525; padding: 4px 10px; border-radius: 8px; border: 1px solid #d4a017;
        }
        .sel-field { display: flex; align-items: center; gap: 3px; font-size: 10px; color: #aaa; }
        input { width: 42px; background: #000; border: 1px solid #555; color: #d4a017; padding: 2px; border-radius: 4px; text-align: center; font-size: 11px; }
        #fileInput { font-size: 10px; color: #aaa; width: 130px; }

        #saveBtn { background: #d4a017; color: #000; font-weight: bold; border: none; }
        #removeBtn { background: #600; color: white; border: 1px solid red; display: none; }
        #loginBtn { background: #d4a017; color: black; font-weight: bold; border: none; }
        
        /* Statistiche */
        .stat-item b { color: #d4a017; }
        #sel-count-box { color: #00ffcc; font-weight: bold; margin-left: 10px; display: none; }

        #canvas-container { flex-grow: 1; position: relative; overflow: hidden; background: #000; }
        canvas { display: block; image-rendering: pixelated; }
        button { background:#333; color:white; border:1px solid #444; border-radius:4px; cursor:pointer; padding: 4px 8px; font-size: 11px; }
    </style>
</head>
<body>

<header>
    <div class="top-row">
        <div class="controls-group">
            <button id="loginBtn">LOGIN ADMIN</button>
            <div id="adminArea">
                <div class="mode-toggle">
                    <button id="modePan" class="mode-btn active">NAVIGA</button>
                    <button id="modeSelect" class="mode-btn">SELEZIONA</button>
                </div>
                <button id="removeBtn">ELIMINA</button>
                <button id="resetBtn">RESET</button>
            </div>
            <div style="display:flex; align-items:center; gap:5px;">
                <button id="zoomOut">-</button>
                <span id="zoom-level" style="color:#d4a017; font-family:monospace; min-width:35px;">100%</span>
                <button id="zoomIn">+</button>
            </div>
        </div>

        <div id="selectionUI">
            <div class="sel-field">X <input type="number" id="ux"></div>
            <div class="sel-field">Y <input type="number" id="uy"></div>
            <div class="sel-field">W <input type="number" id="uw"></div>
            <div class="sel-field">H <input type="number" id="uh"></div>
            <input type="file" id="fileInput" accept="image/*">
            <button id="saveBtn">PUBBLICA</button>
            <button id="clearSelBtn" style="color:#f88; border:none; background:none; font-size:16px;">✕</button>
        </div>
    </div>

    <div class="stats-row">
        <div style="display:flex; align-items:center;">
            <span style="color:#555; font-weight:bold; margin-right:10px;">ADMIN PIXEL:</span>
            <div class="stat-item" style="margin-right:10px;">Disp: <b id="statFree">0</b></div>
            <div class="stat-item" style="margin-right:10px;">Occ: <b id="statUsed">0</b></div>
            <div id="sel-count-box">Area: <span id="statSel">0</span> px</div>
        </div>
        <div id="coords-label" style="color:#555;">X:0 Y:0</div>
    </div>
</header>

<div id="canvas-container"><canvas id="c"></canvas></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// CONFIG
firebase.initializeApp({ apiKey:"AIzaSyDFPiQn3Uq7_OA0e7UxNoeze8z_EfndwsU", authDomain:"pixel-wall-ff621.firebaseapp.com", projectId:"pixel-wall-ff621" });
const db = firebase.firestore();
const CLOUD = "dkwijnvsl", PRESET = "pixelwall", W=1280, H=720;

const c = document.getElementById("c"), ctx = c.getContext("2d");
const selUI = document.getElementById("selectionUI"), selBox = document.getElementById("sel-count-box");

let scale = 1, ox = 0, oy = 0, blocks = [], cache = {}, isAdmin = false, selectedId = null;
let preview = { x: 0, y: 0, w: 0, h: 0, active: false }, currentMode = 'pan';

function resize() {
    const r = document.getElementById("canvas-container").getBoundingClientRect();
    c.width = r.width; c.height = r.height;
}
window.addEventListener("resize", resize);
resize();

// Snapshot real-time su collezione 'blocks'
db.collection("blocks").onSnapshot(s => { 
    blocks = s.docs.map(d => ({ id: d.id, ...d.data() })); 
    updateStats();
});

function updateStats() {
    let used = 0;
    blocks.forEach(b => used += (b.w * b.h));
    document.getElementById("statFree").innerText = (W*H - used).toLocaleString();
    document.getElementById("statUsed").innerText = used.toLocaleString();
}

function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    ctx.save();
    ctx.translate(Math.round(ox), Math.round(oy));
    ctx.scale(scale, scale);
    ctx.fillStyle = "#111"; ctx.fillRect(0, 0, W, H);
    
    if (scale > 5) {
        ctx.beginPath(); ctx.strokeStyle = "rgba(212,160,23,0.15)"; ctx.lineWidth = 1/scale;
        for(let x=0; x<=W; x+=10) { ctx.moveTo(x,0); ctx.lineTo(x,H); }
        for(let y=0; y<=H; y+=10) { ctx.moveTo(0,y); ctx.lineTo(W,y); }
        ctx.stroke();
    }
    for(let b of blocks) {
        if(!cache[b.img]) { cache[b.img] = new Image(); cache[b.img].src = b.img; }
        if(cache[b.img].complete) ctx.drawImage(cache[b.img], b.x, b.y, b.w, b.h);
        if(b.id === selectedId) {
            ctx.strokeStyle = "red"; ctx.lineWidth = 3/scale;
            ctx.strokeRect(b.x, b.y, b.w, b.h);
        }
    }
    if(preview.active && isAdmin) {
        ctx.fillStyle = "rgba(212, 160, 23, 0.25)"; ctx.strokeStyle = "#d4a017";
        ctx.lineWidth = 2/scale; ctx.fillRect(preview.x, preview.y, preview.w, preview.h);
        ctx.strokeRect(preview.x, preview.y, preview.w, preview.h);
    }
    ctx.restore();
}
function loop() { draw(); requestAnimationFrame(loop); }
loop();

// --- ADMIN LOGIN ---
document.getElementById("loginBtn").onclick = () => {
    if(prompt("Password:") === "admin123") {
        isAdmin = true;
        document.getElementById("loginBtn").style.display = "none";
        document.getElementById("adminArea").style.display = "flex";
    }
};

// --- AZIONI DATABASE (Cloudinary + Firestore) ---
document.getElementById("saveBtn").onclick = async () => {
    const file = document.getElementById("fileInput").files[0];
    if(!file || !preview.active) return alert("Seleziona area e file");
    
    const btn = document.getElementById("saveBtn");
    btn.disabled = true; btn.innerText = "...";

    const form = new FormData(); form.append("file", file); form.append("upload_preset", PRESET);
    try {
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD}/image/upload`, { method: "POST", body: form });
        const data = await res.json();

        await db.collection("blocks").add({
            img: data.secure_url, delete_token: data.delete_token,
            x: preview.x, y: preview.y, w: preview.w, h: preview.h
        });
        resetSelection();
    } catch(e) { alert("Errore caricamento"); }
    btn.disabled = false; btn.innerText = "PUBBLICA";
};

document.getElementById("removeBtn").onclick = async () => {
    if(!selectedId || !confirm("Eliminare definitivamente?")) return;
    const bRem = blocks.find(b => b.id === selectedId);
    if(bRem && bRem.delete_token) {
        const f = new FormData(); f.append("token", bRem.delete_token);
        fetch(`https://api.cloudinary.com/v1_1/${CLOUD}/delete_by_token`, { method: "POST", body: f });
    }
    await db.collection("blocks").doc(selectedId).delete();
    selectedId = null;
    document.getElementById("removeBtn").style.display = "none";
};

// --- LOGICA ZOOM E PAN (CENTRATURA) ---
function applyZoom(s, centerX, centerY) {
    const newScale = Math.max(0.1, Math.min(60, scale * s));
    const worldX = (centerX - ox) / scale, worldY = (centerY - oy) / scale;
    scale = newScale;
    ox = centerX - worldX * scale; oy = centerY - worldY * scale;
    document.getElementById("zoom-level").innerText = Math.round(scale * 100) + "%";
}

c.addEventListener("wheel", e => { e.preventDefault(); applyZoom(e.deltaY < 0 ? 1.1 : 0.9, e.clientX, e.clientY); }, {passive: false});

let evCache = [], prevDiff = -1, isMouseDown = false, startPos = null, lastM = {x:0, y:0};

c.onpointerdown = e => {
    evCache.push(e); isMouseDown = true; lastM = { x: e.clientX, y: e.clientY };
    const r = c.getBoundingClientRect();
    const wp = { x: Math.floor((e.clientX-r.left-ox)/scale), y: Math.floor((e.clientY-r.top-oy)/scale) };

    if (evCache.length === 1) {
        // Selezione blocchi esistenti per eliminazione
        selectedId = null;
        document.getElementById("removeBtn").style.display = "none";
        for(let i=blocks.length-1; i>=0; i--) {
            let b = blocks[i];
            if(wp.x>=b.x && wp.x<b.x+b.w && wp.y>=b.y && wp.y<b.y+b.h) {
                selectedId = b.id;
                if(isAdmin) document.getElementById("removeBtn").style.display = "block";
                break;
            }
        }
        // Inizio disegno nuova selezione
        if (!selectedId && isAdmin && currentMode === 'select' && wp.x >= 0 && wp.x < W && wp.y >= 0 && wp.y < H) {
            startPos = wp; updatePreview(wp.x, wp.y, 1, 1);
        } else startPos = null;
    }
};

c.onpointermove = e => {
    const index = evCache.findIndex(ev => ev.pointerId === e.pointerId);
    if (index !== -1) evCache[index] = e;
    
    // Zoom Multi-touch
    if (evCache.length === 2) {
        const curDiff = Math.hypot(evCache[0].clientX-evCache[1].clientX, evCache[0].clientY-evCache[1].clientY);
        const midX = (evCache[0].clientX+evCache[1].clientX)/2, midY = (evCache[0].clientY+evCache[1].clientY)/2;
        if (prevDiff > 0) applyZoom(curDiff/prevDiff, midX, midY);
        prevDiff = curDiff; return;
    }

    if (isMouseDown && evCache.length === 1) {
        const r = c.getBoundingClientRect();
        const cw = { x: Math.floor((e.clientX-r.left-ox)/scale), y: Math.floor((e.clientY-r.top-oy)/scale) };
        
        if (isAdmin && currentMode === 'select' && startPos) {
            let x1 = Math.max(0, Math.min(startPos.x, cw.x)), y1 = Math.max(0, Math.min(startPos.y, cw.y));
            let x2 = Math.min(W, Math.max(startPos.x, cw.x)+1), y2 = Math.min(H, Math.max(startPos.y, cw.y)+1);
            if (!checkCollision(x1, y1, x2-x1, y2-y1)) updatePreview(x1, y1, x2-x1, y2-y1);
        } else {
            ox += e.clientX - lastM.x; oy += e.clientY - lastM.y;
            lastM = { x: e.clientX, y: e.clientY };
        }
        document.getElementById("coords-label").innerText = `X:${cw.x} Y:${cw.y}`;
    }
};

c.onpointerup = c.onpointercancel = e => {
    evCache = evCache.filter(ev => ev.pointerId !== e.pointerId);
    if (evCache.length < 2) prevDiff = -1;
    isMouseDown = false;
};

// --- UI HELPERS ---
function updatePreview(x, y, w, h) {
    preview = { x, y, w, h, active: true };
    selUI.style.display = "flex";
    selBox.style.display = "block";
    ux.value = x; uy.value = y; uw.value = w; uh.value = h;
    document.getElementById("statSel").innerText = (w * h).toLocaleString();
}

function resetSelection() { 
    preview.active = false; selUI.style.display = "none"; selBox.style.display = "none"; 
}

function setMode(m) {
    currentMode = m;
    document.getElementById("modePan").classList.toggle("active", m === 'pan');
    document.getElementById("modeSelect").classList.toggle("active", m === 'select');
    if (m === 'pan') resetSelection();
}

// Input manuale
["ux", "uy", "uw", "uh"].forEach(id => {
    document.getElementById(id).addEventListener("input", () => {
        const n = { x:+ux.value, y:+uy.value, w:+uw.value, h:+uh.value };
        if (!checkCollision(n.x, n.y, n.w, n.h)) updatePreview(n.x, n.y, n.w, n.h);
    });
});

function checkCollision(x, y, w, h) { return blocks.some(b => x < b.x + b.w && x + w > b.x && y < b.y + b.h && y + h > b.y); }
document.getElementById("modePan").onclick = () => setMode('pan');
document.getElementById("modeSelect").onclick = () => setMode('select');
document.getElementById("clearSelBtn").onclick = resetSelection;
document.getElementById("zoomIn").onclick = () => applyZoom(1.2, c.width/2, c.height/2);
document.getElementById("zoomOut").onclick = () => applyZoom(0.8, c.width/2, c.height/2);
document.getElementById("resetBtn").onclick = () => { scale = 1; ox = (c.width-W)/2; oy = (c.height-H)/2; applyZoom(1, 0, 0); };
window.onload = () => { ox = (c.width-W)/2; oy = (c.height-H)/2; };
</script>
</body>
</html>
