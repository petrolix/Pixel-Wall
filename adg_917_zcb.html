<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Wall - Admin Suite</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box; touch-action: none; }
        body { 
            overflow:hidden; background:#0a0a0a; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            display: flex; flex-direction: column; height: 100vh;
            position: fixed; width: 100%; 
        }

        header {
            background: #1a1a1a; color: white; padding: 8px 12px;
            border-bottom: 2px solid #d4a017; z-index: 10000;
            display: flex; flex-direction: column; gap: 8px;
        }

        .top-row { display: flex; align-items: center; justify-content: flex-start; width: 100%; flex-wrap: wrap; gap: 10px; }
        .stats-row { 
            display: flex; align-items: center; justify-content: flex-start; width: 100%; gap: 15px;
            font-family: monospace; font-size: 11px; color: #888; 
            background: #000; padding: 6px 10px; border-radius: 6px; border: 1px solid #222;
        }
        
        .controls-group { display: flex; align-items: center; gap: 8px; }
        #adminArea { display: none; align-items: center; gap: 8px; }

        #selectionUI { 
            display: none; 
            flex-wrap: wrap;
            align-items: center; 
            justify-content: flex-start;
            gap: 8px; 
            background: #252525; 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid #d4a017;
            width: 100%;
        }
        
        .sel-field { display: flex; align-items: center; gap: 3px; font-size: 11px; color: #aaa; }
        input[type="number"] { width: 45px; background: #000; border: 1px solid #555; color: #d4a017; padding: 4px; border-radius: 4px; text-align: center; }
        input[type="text"] { background: #000; border: 1px solid #555; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 11px; }
        #linkUrl { width: 160px; }
        #linkName { width: 140px; color: #d4a017; }
        #fileInput { font-size: 11px; color: #aaa; min-width: 150px; }

        .mode-toggle { display: flex; background: #000; padding: 2px; border-radius: 8px; border: 1px solid #444; }
        .mode-btn { background: transparent; color: #666; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 10px; font-weight: bold; }
        .mode-btn.active { background: #333; color: #d4a017; }

        button { background:#333; color:white; border:1px solid #444; border-radius:4px; cursor:pointer; padding: 6px 10px; font-size: 11px; }
        #loginBtn { background: #d4a017; color: black; font-weight: bold; border: none; }
        #saveBtn { background: #d4a017; color: black; font-weight: bold; border: none; padding: 8px 15px; }
        #removeBtn { background: #600; color: white; border: 1px solid red; display: none; }

        #canvas-container { flex-grow: 1; position: relative; overflow: hidden; background: #000; }
        canvas { display: block; image-rendering: auto; }
        canvas.mode-pan { cursor: grab; }
        canvas.mode-pan:active { cursor: grabbing; }
        #coords-label { color: #555; margin-left: auto; }
    </style>
</head>
<body>

<header>
    <div class="top-row">
        <div class="controls-group">
            <button id="loginBtn">LOGIN ADMIN</button>
            <div id="adminArea">
                <div class="mode-toggle">
                    <button id="modePan" class="mode-btn active">NAVIGA</button>
                    <button id="modeSelect" class="mode-btn">SELEZIONA</button>
                </div>
                <button id="removeBtn">ELIMINA</button>
                <button id="resetBtn">RESET</button>
            </div>
            <div style="display:flex; align-items:center; gap:5px; background:#222; padding:2px 6px; border-radius:6px;">
                <button id="zoomOut" style="border:none; background:none;">-</button>
                <span id="zoom-level" style="color:#d4a017; font-family:monospace; font-size:11px; min-width:35px; text-align:center;">100%</span>
                <button id="zoomIn" style="border:none; background:none;">+</button>
            </div>
        </div>
    </div>

    <div class="stats-row">
        <span style="color:#d4a017; font-weight:bold;">PIXEL:</span>
        <div class="stat-item">Disp: <b id="statFree">0</b></div>
        <div class="stat-item">Occ: <b id="statUsed">0</b></div>
        <div id="sel-count-box" style="color:#00ffcc; font-weight:bold; display:none;">Area: <span id="statSel">0</span> px</div>
        <div id="coords-label">X:0 Y:0</div>
    </div>

    <div id="selectionUI">
        <div style="display:flex; gap:8px; width:100%; justify-content:flex-start; align-items:center; flex-wrap: wrap;">
            <div class="sel-field">X <input type="number" id="ux"></div>
            <div class="sel-field">Y <input type="number" id="uy"></div>
            <div class="sel-field">W <input type="number" id="uw"></div>
            <div class="sel-field">H <input type="number" id="uh"></div>
            <input type="text" id="linkUrl" placeholder="Link reindirizzamento (https://...)">
            <input type="text" id="linkName" placeholder="Nome visualizzato tooltip...">
            <button id="clearSelBtn" style="background:none; border:none; color:#f88; font-size:18px; padding:0 5px;">✕</button>
        </div>
        <div style="display:flex; gap:8px; width:100%; align-items:center; border-top:1px solid #444; padding-top:8px; justify-content:flex-start;">
            <input type="file" id="fileInput" accept="image/*">
            <button id="saveBtn">PUBBLICA BLOCCO</button>
        </div>
    </div>
</header>

<div id="canvas-container"><canvas id="c" class="mode-pan"></canvas></div>

<div id="url-tooltip" style="
    position: fixed; 
    display: none; 
    background: rgba(0, 0, 0, 0.85); 
    color: #d4a017; 
    padding: 6px 12px; 
    border-radius: 6px; 
    border: 1px solid #d4a017; 
    font-family: monospace; 
    font-size: 11px; 
    pointer-events: none; 
    z-index: 99999;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({ apiKey:"AIzaSyDFPiQn3Uq7_OA0e7UxNoeze8z_EfndwsU", authDomain:"pixel-wall-ff621.firebaseapp.com", projectId:"pixel-wall-ff621" });
const db = firebase.firestore();
const CLOUD = "dkwijnvsl", PRESET = "pixelwall", W=1280, H=720;

const c = document.getElementById("c"), ctx = c.getContext("2d");
const selUI = document.getElementById("selectionUI"), selBox = document.getElementById("sel-count-box");

let scale = 1, ox = 0, oy = 0, blocks = [], cache = {}, isAdmin = false, selectedId = null;
let preview = { x: 0, y: 0, w: 0, h: 0, active: false }, currentMode = 'pan';

function resize() {
    const r = document.getElementById("canvas-container").getBoundingClientRect();
    c.width = r.width; c.height = r.height;
}
window.addEventListener("resize", resize);
resize();

db.collection("blocks").onSnapshot(s => { 
    blocks = s.docs.map(d => ({ id: d.id, ...d.data() })); 
    updateStats();
});

function updateStats() {
    let used = 0;
    blocks.forEach(b => used += (b.w * b.h));
    document.getElementById("statFree").innerText = (W*H - used).toLocaleString();
    document.getElementById("statUsed").innerText = used.toLocaleString();
}

function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    ctx.save();
    ctx.translate(Math.round(ox), Math.round(oy));
    ctx.scale(scale, scale);
    ctx.fillStyle = "#111"; ctx.fillRect(0, 0, W, H);
    
    if (scale > 15) {
        ctx.beginPath(); ctx.strokeStyle = "rgba(212,160,23,0.15)"; ctx.lineWidth = 1/scale;
        for(let x=0; x<=W; x+=1) { ctx.moveTo(x,0); ctx.lineTo(x,H); }
        for(let y=0; y<=H; y+=1) { ctx.moveTo(0,y); ctx.lineTo(W,y); }
        ctx.stroke();
    } else if (scale > 4) {
        ctx.beginPath(); ctx.strokeStyle = "rgba(212,160,23,0.08)"; ctx.lineWidth = 1/scale;
        for(let x=0; x<=W; x+=10) { ctx.moveTo(x,0); ctx.lineTo(x,H); }
        for(let y=0; y<=H; y+=10) { ctx.moveTo(0,y); ctx.lineTo(W,y); }
        ctx.stroke();
    }

    for(let b of blocks) {
        if(!cache[b.img]) { cache[b.img] = new Image(); cache[b.img].src = b.img; }
        if(cache[b.img].complete) ctx.drawImage(cache[b.img], b.x, b.y, b.w, b.h);
        if(b.id === selectedId) {
            ctx.strokeStyle = "red"; ctx.lineWidth = 3/scale;
            ctx.strokeRect(b.x, b.y, b.w, b.h);
        }
    }
    if(preview.active && isAdmin) {
        ctx.fillStyle = "rgba(212, 160, 23, 0.25)"; ctx.strokeStyle = "#d4a017";
        ctx.lineWidth = 2/scale; ctx.fillRect(preview.x, preview.y, preview.w, preview.h);
        ctx.strokeRect(preview.x, preview.y, preview.w, preview.h);
    }
    ctx.restore();
}
function loop() { draw(); requestAnimationFrame(loop); }
loop();

document.getElementById("loginBtn").onclick = () => {
    if(prompt("Password:") === "admin123") {
        isAdmin = true;
        document.getElementById("loginBtn").style.display = "none";
        document.getElementById("adminArea").style.display = "flex";
    }
};

// --- INVIO FILE ORIGINALE PURO SENZA COMPRESSIONE CLIENT ---
document.getElementById("saveBtn").onclick = async () => {
    const file = document.getElementById("fileInput").files[0];
    const targetLink = document.getElementById("linkUrl").value.trim();
    const targetName = document.getElementById("linkName").value.trim();
    if(!file || !preview.active) return alert("Scegli area e file");
    
    const btn = document.getElementById("saveBtn");
    btn.disabled = true; btn.innerText = "CARICO SU CLOUDINARY...";

    const form = new FormData(); 
    form.append("file", file); // Invia direttamente il file di input intatto
    form.append("upload_preset", PRESET);
    
    try {
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD}/image/upload`, { method: "POST", body: form });
        const data = await res.json();
        
        await db.collection("blocks").add({ 
            img: data.secure_url, 
            delete_token: data.delete_token, 
            x: preview.x, y: preview.y, w: preview.w, h: preview.h,
            link: targetLink,
            linkName: targetName
        });
        document.getElementById("linkUrl").value = "";
        document.getElementById("linkName").value = "";
        resetSelection();
    } catch(e) { alert("Errore nel caricamento!"); }
    btn.disabled = false; btn.innerText = "PUBBLICA BLOCCO";
};

document.getElementById("removeBtn").onclick = async () => {
    if(!selectedId || !confirm("Eliminare?")) return;
    const bRem = blocks.find(b => b.id === selectedId);
    if(bRem?.delete_token) {
        const f = new FormData(); f.append("token", bRem.delete_token);
        fetch(`https://api.cloudinary.com/v1_1/${CLOUD}/delete_by_token`, { method: "POST", body: f });
    }
    await db.collection("blocks").doc(selectedId).delete();
    selectedId = null;
    document.getElementById("removeBtn").style.display = "none";
};

function applyZoom(s, cx, cy) {
    const ns = Math.max(0.1, Math.min(60, scale * s));
    const wx = (cx - ox) / scale, wy = (cy - oy) / scale;
    scale = ns; ox = cx - wx * scale; oy = cy - wy * scale;
    document.getElementById("zoom-level").innerText = Math.round(scale * 100) + "%";
}

c.addEventListener("wheel", e => { e.preventDefault(); applyZoom(e.deltaY < 0 ? 1.1 : 0.9, e.clientX, e.clientY); }, {passive: false});

let evCache = [], prevDiff = -1, isMouseDown = false, startPos = null, lastM = {x:0, y:0};
let totalMovement = 0;

c.onpointerdown = e => {
    evCache.push(e); isMouseDown = true; lastM = {x:e.clientX, y:e.clientY};
    totalMovement = 0;
    const r = c.getBoundingClientRect();
    const wp = { x: Math.floor((e.clientX-r.left-ox)/scale), y: Math.floor((e.clientY-r.top-oy)/scale) };
    if(evCache.length === 1) {
        selectedId = null;
        document.getElementById("removeBtn").style.display = "none";
        for(let i=blocks.length-1; i>=0; i--) {
            let b = blocks[i];
            if(wp.x>=b.x && wp.x<b.x+b.w && wp.y>=b.y && wp.y<b.y+b.h) {
                selectedId = b.id;
                if(isAdmin) document.getElementById("removeBtn").style.display = "block";
                break;
            }
        }
        if(!selectedId && isAdmin && currentMode === 'select' && wp.x>=0 && wp.x<W && wp.y>=0 && wp.y<H) {
            startPos = wp; updatePreview(wp.x, wp.y, 1, 1);
        } else startPos = null;
    }
};

c.onpointermove = e => {
    const index = evCache.findIndex(ev => ev.pointerId === e.pointerId);
    if (index !== -1) evCache[index] = e;
    if (evCache.length === 2) {
        const d = Math.hypot(evCache[0].clientX-evCache[1].clientX, evCache[0].clientY-evCache[1].clientY);
        if (prevDiff > 0) applyZoom(d/prevDiff, (evCache[0].clientX+evCache[1].clientX)/2, (evCache[0].clientY+evCache[1].clientY)/2);
        prevDiff = d; return;
    }
    const r = c.getBoundingClientRect();
    const cw = { x: Math.floor((e.clientX-r.left-ox)/scale), y: Math.floor((e.clientY-r.top-oy)/scale) };
    document.getElementById("coords-label").innerText = `X:${cw.x} Y:${cw.y}`;

    const tooltip = document.getElementById("url-tooltip");
    if (currentMode === 'pan' && !isMouseDown) {
        const hoverTarget = blocks.find(b => cw.x >= b.x && cw.x < b.x + b.w && cw.y >= b.y && cw.y < b.y + b.h);
        if (hoverTarget && hoverTarget.link) {
            c.className = ""; c.style.cursor = "pointer";
            tooltip.style.display = "block";
            tooltip.innerText = hoverTarget.linkName ? `🔗 ${hoverTarget.linkName}` : `🔗 Apri: ${hoverTarget.link}`;
            tooltip.style.left = (e.clientX + 15) + "px";
            tooltip.style.top = (e.clientY + 15) + "px";
        } else {
            c.className = "mode-pan"; c.style.cursor = ""; tooltip.style.display = "none";
        }
    } else { tooltip.style.display = "none"; }

    if (isMouseDown && evCache.length === 1) {
        totalMovement += Math.hypot(e.clientX - lastM.x, e.clientY - lastM.y);
        if (isAdmin && currentMode === 'select' && startPos) {
            let x1 = Math.max(0, Math.min(startPos.x, cw.x)), y1 = Math.max(0, Math.min(startPos.y, cw.y));
            let x2 = Math.min(W, Math.max(startPos.x, cw.x)+1), y2 = Math.min(H, Math.max(startPos.y, cw.y)+1);
            if (!blocks.some(b => x1 < b.x+b.w && x2 > b.x && y1 < b.y+b.h && y2 > b.y)) updatePreview(x1, y1, x2-x1, y2-y1);
        } else {
            ox += e.clientX - lastM.x; oy += e.clientY - lastM.y;
            lastM = {x:e.clientX, y:e.clientY};
        }
    }
};

c.onpointerup = c.onpointercancel = e => {
    if (isMouseDown && evCache.length === 1 && totalMovement < 5 && currentMode === 'pan') {
        const r = c.getBoundingClientRect();
        const clickX = (e.clientX - r.left - ox) / scale;
        const clickY = (e.clientY - r.top - oy) / scale;
        const target = blocks.find(b => clickX >= b.x && clickX < b.x + b.w && clickY >= b.y && clickY < b.y + b.h);
        if (target && target.link) {
            let url = target.link.trim();
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
            window.open(url, '_blank');
        }
    }
    evCache = evCache.filter(ev => ev.pointerId !== e.pointerId);
    if(evCache.length < 2) prevDiff = -1;
    isMouseDown = false;
};

function updatePreview(x, y, w, h) {
    preview = { x, y, w, h, active: true };
    selUI.style.display = "flex";
    selBox.style.display = "block";
    document.getElementById("ux").value = x; document.getElementById("uy").value = y; document.getElementById("uw").value = w; document.getElementById("uh").value = h;
    document.getElementById("statSel").innerText = (w * h).toLocaleString();
}

function resetSelection() { preview.active = false; selUI.style.display = "none"; selBox.style.display = "none"; }
function setMode(m) { currentMode = m; document.getElementById("modePan").classList.toggle("active", m === 'pan'); document.getElementById("modeSelect").classList.toggle("active", m === 'select'); if (m === 'pan') resetSelection(); }

["ux", "uy", "uw", "uh"].forEach(id => {
    document.getElementById(id).addEventListener("input", () => {
        const nx = parseInt(document.getElementById("ux").value) || 0;
        const ny = parseInt(document.getElementById("uy").value) || 0;
        const nw = parseInt(document.getElementById("uw").value) || 1;
        const nh = parseInt(document.getElementById("uh").value) || 1;
        if (!checkCollision(nx, ny, nw, nh)) updatePreview(nx, ny, nw, nh);
    });
});

function checkCollision(x, y, w, h) { return blocks.some(b => x < b.x + b.w && x + w > b.x && y < b.y + b.h && y + h > b.y); }
document.getElementById("modePan").onclick = () => setMode('pan');
document.getElementById("modeSelect").onclick = () => setMode('select');
document.getElementById("clearSelBtn").onclick = resetSelection;
document.getElementById("zoomIn").onclick = () => applyZoom(1.2, c.width/2, c.height/2);
document.getElementById("zoomOut").onclick = () => applyZoom(0.8, c.width/2, c.height/2);
document.getElementById("resetBtn").onclick = () => { scale = 1; ox = (c.width-W)/2; oy = (c.height-H)/2; applyZoom(1, 0, 0); };
window.onload = () => { ox = (c.width-W)/2; oy = (c.height-H)/2; };
</script>
</body>
</html>
