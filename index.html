<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Pixel Wall</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#0f0f0f;
font-family:Arial;
}

/* TOOLBAR */
#toolbar{
position:fixed;
top:10px;
left:10px;
z-index:9999;
display:flex;
gap:10px;
align-items:center;
background:#1b1b1b;
padding:10px;
border-radius:10px;
border:1px solid #333;
}

button{
background:#222;
color:#fff;
border:1px solid #444;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
touch-action: manipulation;
}

/* INFO TOOLTIP */
#tooltip{
position:fixed;
pointer-events:none;
background:rgba(0,0,0,0.75);
color:#fff;
padding:6px 10px;
border-radius:6px;
font-size:12px;
z-index:99999;
transform:translate(10px,10px);
white-space:nowrap;
}

/* CANVAS */
canvas{
display:block;
cursor:grab;
image-rendering: pixelated;
touch-action:none;
}

</style>
</head>

<body>

<div id="toolbar">
<button id="adminBtn">Admin</button>
<button id="removeBtn" style="display:none;">Rimuovi</button>
<button id="resetBtn">Reset</button>
<div id="info"></div>
</div>

<div id="tooltip"></div>

<input type="file" id="imageInput" accept="image/*" hidden>
<canvas id="canvas"></canvas>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

/* ================= FIREBASE ================= */

const firebaseConfig = {
apiKey: "AIzaSyDFPiQn3Uq7_OA0e7UxNoeze8z_EfndwsU",
authDomain: "pixel-wall-ff621.firebaseapp.com",
projectId: "pixel-wall-ff621",
storageBucket: "pixel-wall-ff621.firebasestorage.app",
messagingSenderId: "623723716677",
appId: "1:623723716677:web:4c22d403e1251ef0e9432c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ================= CANVAS ================= */

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

ctx.imageSmoothingEnabled = false;

canvas.width = innerWidth;
canvas.height = innerHeight;

/* ================= WORLD ================= */

const WORLD_W = 1280;
const WORLD_H = 720;
const CELL = 1;

/* ================= STATE ================= */

let scale = 1;

let offsetX = 0;
let offsetY = 0;

let dragging = false;
let dragX = 0;
let dragY = 0;

let admin = false;

let selectStart = null;
let selectEnd = null;

let selectedBlock = -1;

let hoverX = null;
let hoverY = null;

let blocks = [];

/* ================= TOOLTIP ================= */

const tooltip = document.getElementById("tooltip");

/* ================= CACHE ================= */

const imageCache = {};

/* ================= POINTER ================= */

function getPointerPos(e){

const rect = canvas.getBoundingClientRect();

return {
x:(e.clientX - rect.left - offsetX) / scale,
y:(e.clientY - rect.top - offsetY) / scale
};

}

/* ================= HELPERS ================= */

function snap(v){
return Math.floor(v / CELL) * CELL;
}

function drawTooltip(x,y){

tooltip.style.left = x + "px";
tooltip.style.top = y + "px";

if(hoverX !== null){
tooltip.innerText = `X:${Math.floor(hoverX)} Y:${Math.floor(hoverY)}`;
}

}

/* ================= FIREBASE ================= */

db.collection("pixelwall")
.doc("main")
.onSnapshot((doc)=>{
blocks = doc.data()?.blocks || [];
requestAnimationFrame(draw);
});

/* ================= SAVE ================= */

function saveCloud(){
db.collection("pixelwall")
.doc("main")
.set({blocks});
}

/* ================= DRAW ================= */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.save();

ctx.translate(offsetX,offsetY);
ctx.scale(scale,scale);

ctx.fillStyle="#151515";
ctx.fillRect(0,0,WORLD_W,WORLD_H);

/* GRID */
if(scale > 8){

ctx.strokeStyle="#222";
ctx.lineWidth=1/scale;

for(let x=0;x<=WORLD_W;x++){
ctx.beginPath();
ctx.moveTo(x,0);
ctx.lineTo(x,WORLD_H);
ctx.stroke();
}

for(let y=0;y<=WORLD_H;y++){
ctx.beginPath();
ctx.moveTo(0,y);
ctx.lineTo(WORLD_W,y);
ctx.stroke();
}

}

/* HOVER PIXEL HIGHLIGHT */
if(hoverX !== null){

ctx.strokeStyle="rgba(255,255,0,0.6)";
ctx.lineWidth=1/scale;

ctx.strokeRect(
Math.floor(hoverX),
Math.floor(hoverY),
1,1
);

}

/* BLOCKS */
for(let i=0;i<blocks.length;i++){

const b=blocks[i];

let img=imageCache[b.img];

if(!img){
img=new Image();
img.src=b.img;
imageCache[b.img]=img;
}

if(img && img.complete){
ctx.drawImage(
img,
Math.round(b.x),
Math.round(b.y),
Math.round(b.w),
Math.round(b.h)
);
}

if(i===selectedBlock){
ctx.strokeStyle="red";
ctx.strokeRect(b.x,b.y,b.w,b.h);
}

}

/* SNAP PREVIEW (GHOST BLOCK) */
if(admin && selectStart && selectEnd){

let x1 = snap(selectStart.x);
let y1 = snap(selectStart.y);
let x2 = snap(selectEnd.x);
let y2 = snap(selectEnd.y);

if(x2<x1)[x1,x2]=[x2,x1];
if(y2<y1)[y1,y2]=[y2,y1];

const w=(x2-x1)+CELL;
const h=(y2-y1)+CELL;

ctx.fillStyle="rgba(0,150,255,0.2)";
ctx.strokeStyle="rgba(0,150,255,0.8)";
ctx.lineWidth=2/scale;

ctx.fillRect(x1,y1,w,h);
ctx.strokeRect(x1,y1,w,h);

}

ctx.restore();

/* UI TEXT */
info.innerText =
`Zoom ${(scale*100).toFixed(0)}% | Blocchi ${blocks.length}`;

}

/* ================= ADMIN ================= */

adminBtn.onclick=()=>{

const p=prompt("Password admin");

if(p==="admin123"){
admin=!admin;
adminBtn.innerText=admin?"Admin ON":"Admin OFF";
}

};

/* ================= RESET ================= */

resetBtn.onclick=()=>{

scale=1;
offsetX=0;
offsetY=0;

draw();

};

/* ================= REMOVE ================= */

removeBtn.onclick=()=>{

if(selectedBlock>=0){
blocks.splice(selectedBlock,1);
saveCloud();
draw();
}

};

/* ================= MOUSE ================= */

canvas.addEventListener("mousemove",(e)=>{

const pos=getPointerPos(e);

hoverX=pos.x;
hoverY=pos.y;

/* tooltip */
drawTooltip(e.clientX,e.clientY);

if(admin && selectStart){
selectEnd={x:pos.x,y:pos.y};
draw();
return;
}

if(dragging){
offsetX+=e.movementX;
offsetY+=e.movementY;
draw();
}

draw();

});

/* ================= CLICK ================= */

canvas.addEventListener("mousedown",(e)=>{

const pos=getPointerPos(e);

if(admin){
selectStart={x:pos.x,y:pos.y};
selectEnd={...selectStart};
draw();
return;
}

dragging=true;

});

/* ================= UPLOAD ================= */

imageInput.onchange=async(e)=>{

const file=e.target.files[0];
if(!file||!selectStart||!selectEnd)return;

const form=new FormData();
form.append("file",file);
form.append("upload_preset","pixelwall");

const res=await fetch(
"https://api.cloudinary.com/v1_1/dkwijnvsl/image/upload",
{method:"POST",body:form}
);

const data=await res.json();

let x1=selectStart.x;
let y1=selectStart.y;
let x2=selectEnd.x;
let y2=selectEnd.y;

if(x2<x1)[x1,x2]=[x2,x1];
if(y2<y1)[y1,y2]=[y2,y1];

blocks.push({
img:data.secure_url,
x:x1,
y:y1,
w:(x2-x1)+CELL,
h:(y2-y1)+CELL
});

saveCloud();

draw();

};

/* ================= INIT ================= */

draw();

</script>

</body>
</html>
