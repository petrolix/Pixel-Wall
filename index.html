<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pixel Wall FULL</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
overflow:hidden;
background:#0f0f0f;
font-family:Arial;
}

#toolbar{
position:fixed;
top:10px;
left:10px;
z-index:9999;
display:flex;
gap:10px;
align-items:center;
background:#1b1b1b;
padding:10px;
border-radius:10px;
border:1px solid #333;
}

button{
background:#222;
color:#fff;
border:1px solid #444;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

#coords{
position:fixed;
top:10px;
right:10px;
background:#111;
color:#fff;
padding:8px;
font-size:12px;
border-radius:6px;
}

canvas{
display:block;
touch-action:none;
image-rendering:pixelated;
cursor:grab;
}
canvas:active{cursor:grabbing;}
</style>
</head>

<body>

<div id="toolbar">
<button id="adminBtn">Admin</button>
<button id="removeBtn" style="display:none;">Rimuovi</button>
<button id="resetBtn">Reset</button>
</div>

<div id="coords">X:0 Y:0</div>

<input type="file" id="file" hidden>
<canvas id="c"></canvas>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

/* ================= FIREBASE ================= */
firebase.initializeApp({
apiKey:"AIzaSyDFPiQn3Uq7_OA0e7UxNoeze8z_EfndwsU",
authDomain:"pixel-wall-ff621.firebaseapp.com",
projectId:"pixel-wall-ff621"
});

const db=firebase.firestore();

/* ================= CLOUDINARY ================= */
const CLOUD="dkwijnvsl";
const PRESET="pixelwall";

/* ================= WORLD ================= */
const W=1280,H=720;

/* ================= CANVAS ================= */
const c=document.getElementById("c");
const ctx=c.getContext("2d");
ctx.imageSmoothingEnabled=false;

function resize(){
c.width=innerWidth;
c.height=innerHeight;
}
resize();

/* ================= STATE ================= */
let scale=1;
let ox=0,oy=0;

let blocks=[];
let admin=false;
let selected=null;

let selStart=null;
let selEnd=null;

/* ================= CACHE ================= */
const cache={};

/* ================= FIREBASE ================= */
db.collection("pixelwall").doc("main").onSnapshot(d=>{
blocks=d.data()?.blocks||[];
});

/* ================= SAVE ================= */
function save(){
db.collection("pixelwall").doc("main").set({blocks},{merge:true});
}

/* ================= CENTER ================= */
function center(){
ox=(c.width-W*scale)/2;
oy=(c.height-H*scale)/2;
}

/* ================= WORLD POS ================= */
function pos(e){
const r=c.getBoundingClientRect();
return{
x:(e.clientX-r.left-ox)/scale,
y:(e.clientY-r.top-oy)/scale
};
}

/* ================= DRAW GRID ================= */
function draw(){

ctx.clearRect(0,0,c.width,c.height);

ctx.save();
ctx.translate(ox,oy);
ctx.scale(scale,scale);

/* background */
ctx.fillStyle="#151515";
ctx.fillRect(0,0,W,H);

/* GRID */
ctx.strokeStyle="#222";
ctx.lineWidth=1/scale;

for(let x=0;x<=W;x++){
ctx.beginPath();
ctx.moveTo(x,0);
ctx.lineTo(x,H);
ctx.stroke();
}

for(let y=0;y<=H;y++){
ctx.beginPath();
ctx.moveTo(0,y);
ctx.lineTo(W,y);
ctx.stroke();
}

/* selection preview */
if(admin && selStart && selEnd){
ctx.fillStyle="rgba(0,150,255,0.25)";
ctx.strokeStyle="#00aaff";

let x1=Math.min(selStart.x,selEnd.x);
let y1=Math.min(selStart.y,selEnd.y);
let x2=Math.max(selStart.x,selEnd.x);
let y2=Math.max(selStart.y,selEnd.y);

ctx.fillRect(x1,y1,x2-x1,y2-y1);
ctx.strokeRect(x1,y1,x2-x1,y2-y1);
}

/* blocks */
for(let b of blocks){

if(!cache[b.img]){
let img=new Image();
img.src=b.img;
cache[b.img]=img;
}

let img=cache[b.img];

if(img.complete){
ctx.drawImage(img,b.x,b.y,b.w,b.h);
}

if(b.id===selected){
ctx.strokeStyle="red";
ctx.lineWidth=2/scale;
ctx.strokeRect(b.x,b.y,b.w,b.h);
}

}

ctx.restore();
}

/* ================= LOOP ================= */
function loop(){
draw();
requestAnimationFrame(loop);
}
loop();

/* ================= PAN ================= */
let drag=false;
let lx=0,ly=0;

c.addEventListener("mousedown",e=>{
drag=true;
lx=e.clientX;
ly=e.clientY;

if(admin){
selStart=pos(e);
selEnd=selStart;
}
});

c.addEventListener("mousemove",e=>{

document.getElementById("coords").innerText=
`X:${Math.floor(pos(e).x)} Y:${Math.floor(pos(e).y)}`;

if(drag && !admin){
ox+=e.clientX-lx;
oy+=e.clientY-ly;
lx=e.clientX;
ly=e.clientY;
}

if(admin && selStart){
selEnd=pos(e);
}

});

c.addEventListener("mouseup",()=>{

drag=false;

/* upload trigger */
if(admin && selStart && selEnd){
document.getElementById("file").click();
}

});

/* ================= ZOOM ================= */
c.addEventListener("wheel",e=>{
e.preventDefault();
scale*=e.deltaY<0?1.1:0.9;
scale=Math.max(0.2,Math.min(50,scale));
});

/* ================= SELECT ================= */
c.addEventListener("click",e=>{

let p=pos(e);
selected=null;

for(let i=blocks.length-1;i>=0;i--){
let b=blocks[i];
if(p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h){
selected=b.id;
break;
}
}

});

/* ================= ADMIN ================= */
document.getElementById("adminBtn").onclick=()=>{
if(prompt("admin")==="admin123"){
admin=!admin;
document.getElementById("removeBtn").style.display=admin?"block":"none";
}
};

/* ================= REMOVE ================= */
document.getElementById("removeBtn").onclick=()=>{
blocks=blocks.filter(b=>b.id!==selected);
selected=null;
save();
};

/* ================= RESET ================= */
document.getElementById("resetBtn").onclick=()=>{
scale=1;
center();
};

/* ================= UPLOAD ================= */
document.getElementById("file").onchange=async(e)=>{

const file=e.target.files[0];
if(!file||!selStart||!selEnd)return;

const form=new FormData();
form.append("file",file);
form.append("upload_preset",PRESET);

const res=await fetch(
`https://api.cloudinary.com/v1_1/${CLOUD}/image/upload`,
{method:"POST",body:form}
);

const data=await res.json();

blocks.push({
id:Date.now(),
img:data.secure_url,
x:Math.min(selStart.x,selEnd.x),
y:Math.min(selStart.y,selEnd.y),
w:Math.abs(selEnd.x-selStart.x),
h:Math.abs(selEnd.y-selStart.y)
});

save();

selStart=null;
selEnd=null;

};

/* ================= INIT ================= */
center();
draw();

window.addEventListener("resize",()=>{
resize();
center();
draw();
});

</script>

</body>
</html>
