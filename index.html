<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Pixel Engine PRO</title>

<style>

body{
margin:0;
overflow:hidden;
background:#111;
font-family:Arial;
}

#ui{
position:fixed;
top:10px;
left:10px;
z-index:9999;
background:#1b1b1b;
color:#fff;
padding:10px;
border-radius:10px;
font-size:14px;
}

canvas{
display:block;
touch-action:none;
image-rendering:pixelated;
}

</style>
</head>

<body>

<div id="ui">Pixel Engine PRO</div>
<canvas id="canvas"></canvas>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

/* ================= WORLD ================= */

const WORLD_W=5000;
const WORLD_H=5000;

/* chunk size (base performance system) */
const CHUNK=100;

/* ================= VIEW ================= */

let scale=1;
let offsetX=0;
let offsetY=0;

/* ================= INPUT ================= */

let dragging=false;
let lastX=0;
let lastY=0;

/* ================= DATA ================= */

let blocks=[];

/* multi selection */
let selection=null;
let selected=[];

/* ================= VIEWPORT ================= */

function getView(){

return {
x1:(-offsetX)/scale,
y1:(-offsetY)/scale,
x2:(-offsetX+canvas.width)/scale,
y2:(-offsetY+canvas.height)/scale
};

}

/* ================= CHUNK SYSTEM ================= */

function chunkKey(x,y){
return Math.floor(x/CHUNK)+"_"+Math.floor(y/CHUNK);
}

/* ================= DRAW (OPTIMIZED) ================= */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.save();
ctx.translate(offsetX,offsetY);
ctx.scale(scale,scale);

const v=getView();

/* ONLY VISIBLE BLOCKS */
for(let i=0;i<blocks.length;i++){

const b=blocks[i];

/* CULLING (core performance boost) */
if(
b.x+b.size < v.x1 ||
b.x > v.x2 ||
b.y+b.size < v.y1 ||
b.y > v.y2
) continue;

/* draw */
ctx.fillStyle=b.color;
ctx.fillRect(b.x,b.y,b.size,b.size);

}

/* selection box */
if(selection){

ctx.strokeStyle="cyan";
ctx.lineWidth=1/scale;

ctx.strokeRect(
selection.x,
selection.y,
selection.w,
selection.h
);

}

/* selected blocks */
for(let i=0;i<selected.length;i++){

const b=selected[i];

ctx.strokeStyle="red";
ctx.strokeRect(b.x,b.y,b.size,b.size);

}

ctx.restore();

}

/* ================= INPUT ================= */

canvas.addEventListener("mousedown",(e)=>{

dragging=true;
lastX=e.clientX;
lastY=e.clientY;

/* start selection */
selection={
x:(e.clientX-offsetX)/scale,
y:(e.clientY-offsetY)/scale,
w:0,
h:0
};

selected=[];

});

canvas.addEventListener("mousemove",(e)=>{

/* PAN */
if(dragging && !selection){
offsetX+=e.clientX-lastX;
offsetY+=e.clientY-lastY;
lastX=e.clientX;
lastY=e.clientY;
draw();
return;
}

/* SELECTION */
if(dragging && selection){

let x=(e.clientX-offsetX)/scale;
let y=(e.clientY-offsetY)/scale;

selection.w=x-selection.x;
selection.h=y-selection.y;

draw();
}

});

/* END DRAG */
canvas.addEventListener("mouseup",()=>{

dragging=false;

/* normalize selection */
if(selection){

let x1=selection.x;
let y1=selection.y;
let x2=x1+selection.w;
let y2=y1+selection.h;

if(x2<x1)[x1,x2]=[x2,x1];
if(y2<y1)[y1,y2]=[y2,y1];

/* MULTI SELECT */
selected=blocks.filter(b=>
b.x>=x1 &&
b.x<=x2 &&
b.y>=y1 &&
b.y<=y2
);

}

selection=null;
draw();

});

/* ================= ZOOM ================= */

canvas.addEventListener("wheel",(e)=>{

e.preventDefault();

const zoom=e.deltaY<0?1.1:0.9;

scale*=zoom;
scale=Math.max(0.1,Math.min(100,scale));

draw();

},{passive:false});

/* ================= TEST DATA ================= */

/* simula MILIONI DI PIXEL */
for(let i=0;i<20000;i++){

blocks.push({
x:Math.random()*WORLD_W,
y:Math.random()*WORLD_H,
size:5,
color:"white"
});

}

/* ================= INIT ================= */

draw();

</script>

</body>
</html>
