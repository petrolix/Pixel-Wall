<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Wall Stable</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
overflow:hidden;
background:#0f0f0f;
font-family:Arial;
}

#toolbar{
position:fixed;
top:10px;
left:10px;
z-index:9999;
display:flex;
gap:10px;
align-items:center;
background:#1b1b1b;
padding:10px;
border-radius:10px;
border:1px solid #333;
}

button{
background:#222;
color:#fff;
border:1px solid #444;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

#coords{
position:fixed;
top:10px;
right:10px;
background:#111;
color:#fff;
padding:8px;
font-size:12px;
border-radius:6px;
}

canvas{
display:block;
touch-action:none;
image-rendering:pixelated;
}
</style>
</head>

<body>

<div id="toolbar">
<button id="adminBtn">Admin</button>
<button id="removeBtn" style="display:none;">Rimuovi</button>
<button id="resetBtn">Reset</button>
</div>

<div id="coords">X:0 Y:0</div>

<canvas id="c"></canvas>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

/* ================= FIREBASE ================= */
firebase.initializeApp({
apiKey:"AIzaSyDFPiQn3Uq7_OA0e7UxNoeze8z_EfndwsU",
authDomain:"pixel-wall-ff621.firebaseapp.com",
projectId:"pixel-wall-ff621"
});

const db=firebase.firestore();

/* ================= CANVAS ================= */
const c=document.getElementById("c");
const ctx=c.getContext("2d");
ctx.imageSmoothingEnabled=false;

function resize(){
c.width=innerWidth;
c.height=innerHeight;
}
resize();

/* ================= WORLD ================= */
const W=1280,H=720;

/* ================= STATE ================= */
let scale=1;
let ox=0,oy=0;
let blocks=[];
let selected=null;
let admin=false;

/* ================= CACHE IMMAGINI ================= */
const cache={};

/* ================= FIREBASE LOAD ================= */
db.collection("pixelwall").doc("main").onSnapshot(d=>{
blocks=d.data()?.blocks||[];
});

/* ================= CENTER ================= */
function center(){
ox=(c.width-W*scale)/2;
oy=(c.height-H*scale)/2;
}

/* ================= POINTER ================= */
function pos(e){
const r=c.getBoundingClientRect();
return{
x:(e.clientX-r.left-ox)/scale,
y:(e.clientY-r.top-oy)/scale
};
}

/* ================= RENDER LOOP (FIX VERO) ================= */
function draw(){

ctx.clearRect(0,0,c.width,c.height);

ctx.save();
ctx.translate(ox,oy);
ctx.scale(scale,scale);

/* background */
ctx.fillStyle="#151515";
ctx.fillRect(0,0,W,H);

/* blocks */
for(let b of blocks){

if(!cache[b.img]){
const img=new Image();
img.src=b.img;

/* 🔥 FORZA REDRAW QUANDO CARICA */
img.onload=()=>{};
cache[b.img]=img;
}

const img=cache[b.img];

if(img && img.complete && img.naturalWidth>0){
ctx.drawImage(img,b.x,b.y,b.w,b.h);
}

if(b.id===selected){
ctx.strokeStyle="red";
ctx.lineWidth=2/scale;
ctx.strokeRect(b.x,b.y,b.w,b.h);
}

}

ctx.restore();

}

/* ================= CONTINUOUS LOOP ================= */
function loop(){
draw();
requestAnimationFrame(loop);
}
loop();

/* ================= PAN ================= */
let dragging=false;
let lx=0,ly=0;

c.addEventListener("mousedown",e=>{
dragging=true;
lx=e.clientX;
ly=e.clientY;
});

c.addEventListener("mousemove",e=>{

document.getElementById("coords").innerText=
`X:${Math.floor(pos(e).x)} Y:${Math.floor(pos(e).y)}`;

if(dragging){
ox+=e.clientX-lx;
oy+=e.clientY-ly;
lx=e.clientX;
ly=e.clientY;
}
});

c.addEventListener("mouseup",()=>dragging=false);

/* ================= ZOOM ================= */
c.addEventListener("wheel",e=>{
e.preventDefault();
scale*=e.deltaY<0?1.1:0.9;
scale=Math.max(0.2,Math.min(50,scale));
});

/* ================= SELECT ================= */
c.addEventListener("click",e=>{
let p=pos(e);
selected=null;

for(let i=blocks.length-1;i>=0;i--){
let b=blocks[i];
if(p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h){
selected=b.id;
break;
}
}
});

/* ================= ADMIN ================= */
document.getElementById("adminBtn").onclick=()=>{
if(prompt("admin")==="admin123"){
admin=!admin;
document.getElementById("removeBtn").style.display=admin?"block":"none";
}
};

/* ================= REMOVE FIX ================= */
document.getElementById("removeBtn").onclick=()=>{

blocks=blocks.filter(b=>b.id!==selected);
selected=null;

db.collection("pixelwall").doc("main").set({blocks});

};

/* ================= RESET ================= */
document.getElementById("resetBtn").onclick=()=>{
scale=1;
center();
};

window.addEventListener("resize",()=>{
resize();
center();
});

center();

</script>

</body>
</html>
