<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Pixel Wall Stable</title>

<style>

body{
margin:0;
overflow:hidden;
background:#111;
}

canvas{
display:block;
touch-action:none;
}

#ui{
position:fixed;
top:10px;
left:10px;
background:#222;
color:#fff;
padding:8px;
border-radius:8px;
font-family:Arial;
font-size:14px;
z-index:10;
}

</style>
</head>

<body>

<div id="ui">Pixel Wall Stable</div>
<canvas id="canvas"></canvas>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

/* ================= WORLD ================= */

const WORLD_W=3000;
const WORLD_H=3000;

/* ================= STATE ================= */

let scale=1;
let offsetX=0;
let offsetY=0;

let dragging=false;
let lastX=0;
let lastY=0;

/* ================= DATA ================= */

let blocks=[];

/* selection */
let selection=null;
let selected=[];

/* ================= INIT TEST DATA ================= */

for(let i=0;i<8000;i++){

blocks.push({
x:Math.random()*WORLD_W,
y:Math.random()*WORLD_H,
size:6,
color:"#fff"
});

}

/* ================= VIEW ================= */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.save();

ctx.translate(offsetX,offsetY);
ctx.scale(scale,scale);

/* VIEWPORT */
const view={
x1:(-offsetX)/scale,
y1:(-offsetY)/scale,
x2:(-offsetX+canvas.width)/scale,
y2:(-offsetY+canvas.height)/scale
};

/* BLOCKS (SAFE CULLING) */
for(let i=0;i<blocks.length;i++){

const b=blocks[i];

if(
b.x+b.size<view.x1 ||
b.x>view.x2 ||
b.y+b.size<view.y1 ||
b.y>view.y2
) continue;

ctx.fillStyle=b.color;
ctx.fillRect(b.x,b.y,b.size,b.size);

}

/* selection box */
if(selection){

ctx.strokeStyle="cyan";
ctx.lineWidth=1/scale;

ctx.strokeRect(
selection.x,
selection.y,
selection.w,
selection.h
);

}

/* selected */
for(let i=0;i<selected.length;i++){

const b=selected[i];

ctx.strokeStyle="red";
ctx.strokeRect(b.x,b.y,b.size,b.size);

}

ctx.restore();

}

/* ================= PAN ================= */

canvas.addEventListener("mousedown",(e)=>{

dragging=true;
lastX=e.clientX;
lastY=e.clientY;

/* start selection */
selection={
x:(e.clientX-offsetX)/scale,
y:(e.clientY-offsetY)/scale,
w:0,
h:0
};

selected=[];

});

canvas.addEventListener("mousemove",(e)=>{

if(dragging && selection){

let x=(e.clientX-offsetX)/scale;
let y=(e.clientY-offsetY)/scale;

selection.w=x-selection.x;
selection.h=y-selection.y;

draw();
return;
}

if(dragging){

offsetX+=e.clientX-lastX;
offsetY+=e.clientY-lastY;

lastX=e.clientX;
lastY=e.clientY;

draw();
}

});

canvas.addEventListener("mouseup",()=>{

dragging=false;

/* finalize selection */
if(selection){

let x1=selection.x;
let y1=selection.y;
let x2=x1+selection.w;
let y2=y1+selection.h;

if(x2<x1)[x1,x2]=[x2,x1];
if(y2<y1)[y1,y2]=[y2,y1];

selected=blocks.filter(b=>
b.x>=x1 &&
b.x<=x2 &&
b.y>=y1 &&
b.y<=y2
);

}

selection=null;
draw();

});

/* ================= ZOOM ================= */

canvas.addEventListener("wheel",(e)=>{

e.preventDefault();

const zoom=e.deltaY<0?1.1:0.9;

scale*=zoom;
scale=Math.max(0.2,Math.min(50,scale));

draw();

},{passive:false});

/* ================= INIT ================= */

draw();

</script>

</body>
</html>
