<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Wall - Professional Suite</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body { 
            overflow:hidden; background:#0a0a0a; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            display: flex; flex-direction: column; height: 100vh;
        }

        header {
            background: #1a1a1a; color: white; padding: 10px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #333; z-index: 10000;
        }

        .controls-group { display: flex; align-items: center; gap: 15px; }

        #selectionUI {
            display: flex; align-items: center; gap: 10px;
            background: #252525; padding: 5px 15px; border-radius: 8px;
            border: 1px solid #444; visibility: hidden; /* Nascosto se non c'è selezione */
        }
        #selectionUI.active { visibility: visible; border-color: lime; }

        .input-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #888; }
        input {
            width: 55px; background: #000; border: 1px solid #555; 
            color: lime; padding: 4px; border-radius: 4px; 
            text-align: center; font-family: monospace;
        }

        button {
            background: #333; color: #eee; border: 1px solid #555; 
            padding: 6px 12px; border-radius: 6px; cursor: pointer; 
            font-size: 12px; font-weight: bold; transition: 0.2s;
        }
        button:hover { background: #444; border-color: lime; }
        .btn-red { border-color: #600; color: #f88; }
        .btn-red:hover { background: #400; border-color: red; color: #fff; }

        #canvas-container { flex-grow: 1; position: relative; overflow: hidden; cursor: crosshair; }
        canvas { display: block; image-rendering: pixelated; touch-action: none; }
    </style>
</head>
<body>

<header>
    <div class="controls-group">
        <button id="resetBtn">Centra Mappa</button>
        <span id="coords-label" style="font-family: monospace; color: #666; font-size: 13px;">X:0 Y:0</span>
    </div>

    <div id="selectionUI">
        <div class="input-item">X <input type="number" id="ux"></div>
        <div class="input-item">Y <input type="number" id="uy"></div>
        <div class="input-item">W <input type="number" id="uw"></div>
        <div class="input-item">H <input type="number" id="uh"></div>
        <button id="clearSelBtn" class="btn-red">Reset Selezione</button>
    </div>
</header>

<div id="canvas-container">
    <canvas id="c"></canvas>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({ apiKey:"AIzaSyDFPiQn3Uq7_OA0e7UxNoeze8z_EfndwsU", authDomain:"pixel-wall-ff621.firebaseapp.com", projectId:"pixel-wall-ff621" });
const db = firebase.firestore();
const W = 1280, H = 720;
const c = document.getElementById("c"), ctx = c.getContext("2d");
const selUI = document.getElementById("selectionUI");

let scale = 1, ox = 0, oy = 0, blocks = [], cache = {};
let preview = { x: 0, y: 0, w: 0, h: 0, active: false };
let isSelecting = false; // Per estendere l'area trascinando

function resize() {
    const container = document.getElementById("canvas-container");
    c.width = container.clientWidth;
    c.height = container.clientHeight;
}
window.addEventListener("resize", resize);
resize();

db.collection("blocks").onSnapshot(s => { blocks = s.docs.map(d => d.data()); });

/* ================= RENDERING ================= */
function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    ctx.save();
    ctx.translate(Math.round(ox), Math.round(oy));
    ctx.scale(scale, scale);
    
    ctx.fillStyle = "#111"; ctx.fillRect(0, 0, W, H);

    if (scale > 8) {
        ctx.beginPath();
        ctx.strokeStyle = "rgba(255, 255, 255, 0.1)"; ctx.lineWidth = 1/scale;
        for(let x=0; x<=W; x++) { ctx.moveTo(x,0); ctx.lineTo(x,H); }
        for(let y=0; y<=H; y++) { ctx.moveTo(0,y); ctx.lineTo(W,y); }
        ctx.stroke();
    }

    for(let b of blocks) {
        if(!cache[b.img]) { cache[b.img] = new Image(); cache[b.img].src = b.img; }
        if(cache[b.img].complete) ctx.drawImage(cache[b.img], b.x, b.y, b.w, b.h);
    }

    if(preview.active) {
        ctx.fillStyle = "rgba(0, 255, 0, 0.25)";
        ctx.strokeStyle = "lime"; ctx.lineWidth = 2/scale;
        ctx.fillRect(preview.x, preview.y, preview.w, preview.h);
        ctx.strokeRect(preview.x, preview.y, preview.w, preview.h);
    }
    ctx.restore();
}
function loop() { draw(); requestAnimationFrame(loop); }
loop();

/* ================= LOGICA SELEZIONE ESTENSIBILE ================= */
let startPoint = { x: 0, y: 0 };
let isPanning = false, lastMouse = { x: 0, y: 0 };

c.addEventListener("pointerdown", e => {
    const r = c.getBoundingClientRect();
    const worldPos = {
        x: Math.floor((e.clientX - r.left - ox) / scale),
        y: Math.floor((e.clientY - r.top - oy) / scale)
    };

    // Se clicco dentro il muro, inizio selezione. Se fuori o con tasto destro, faccio Pan.
    if (worldPos.x >= 0 && worldPos.x < W && worldPos.y >= 0 && worldPos.y < H) {
        isSelecting = true;
        startPoint = worldPos;
        updatePreview(worldPos.x, worldPos.y, 1, 1);
    } else {
        isPanning = true;
    }
    lastMouse = { x: e.clientX, y: e.clientY };
});

window.addEventListener("pointermove", e => {
    const r = c.getBoundingClientRect();
    const curWorld = {
        x: Math.floor((e.clientX - r.left - ox) / scale),
        y: Math.floor((e.clientY - r.top - oy) / scale)
    };
    
    document.getElementById("coords-label").innerText = `X: ${curWorld.x} Y: ${curWorld.y}`;

    if (isSelecting) {
        // Calcolo rettangolo trascinato
        let x1 = Math.max(0, Math.min(startPoint.x, curWorld.x));
        let y1 = Math.max(0, Math.min(startPoint.y, curWorld.y));
        let x2 = Math.min(W, Math.max(startPoint.x, curWorld.x) + 1);
        let y2 = Math.min(H, Math.max(startPoint.y, curWorld.y) + 1);
        
        updatePreview(x1, y1, x2 - x1, y2 - y1);
    } else if (isPanning) {
        ox += e.clientX - lastMouse.x;
        oy += e.clientY - lastMouse.y;
        lastMouse = { x: e.clientX, y: e.clientY };
    }
});

window.addEventListener("pointerup", () => {
    isSelecting = false;
    isPanning = false;
});

function updatePreview(x, y, w, h) {
    // Vincoli ferrei entro la griglia
    preview.x = Math.max(0, Math.min(x, W - 1));
    preview.y = Math.max(0, Math.min(y, H - 1));
    preview.w = Math.min(w, W - preview.x);
    preview.h = Math.min(h, H - preview.y);
    preview.active = true;
    
    selUI.style.visibility = "visible";
    document.getElementById("ux").value = preview.x;
    document.getElementById("uy").value = preview.y;
    document.getElementById("uw").value = preview.w;
    document.getElementById("uh").value = preview.h;
}

// Reset Selezione
document.getElementById("clearSelBtn").onclick = () => {
    preview.active = false;
    selUI.style.visibility = "hidden";
};

// Sync Manuale
["ux", "uy", "uw", "uh"].forEach(id => {
    document.getElementById(id).addEventListener("input", () => {
        const nx = parseInt(document.getElementById("ux").value) || 0;
        const ny = parseInt(document.getElementById("uy").value) || 0;
        const nw = parseInt(document.getElementById("uw").value) || 1;
        const nh = parseInt(document.getElementById("uh").value) || 1;
        updatePreview(nx, ny, nw, nh);
    });
});

/* ================= ZOOM ================= */
c.addEventListener("wheel", e => {
    e.preventDefault();
    const s = e.deltaY < 0 ? 1.1 : 0.9;
    scale = Math.max(0.1, Math.min(60, scale * s));
}, {passive: false});

document.getElementById("resetBtn").onclick = () => {
    scale = 1; ox = (c.width - W)/2; oy = (c.height - H)/2;
};
window.onload = () => { ox = (c.width - W)/2; oy = (c.height - H)/2; };
</script>
</body>
</html>
