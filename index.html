<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pixel Wall FIX REMOVE</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
overflow:hidden;
background:#0f0f0f;
font-family:Arial;
}

#toolbar{
position:fixed;
top:10px;
left:10px;
z-index:9999;
display:flex;
gap:10px;
align-items:center;
background:#1b1b1b;
padding:10px;
border-radius:10px;
border:1px solid #333;
}

button{
background:#222;
color:#fff;
border:1px solid #444;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

#coords{
position:fixed;
right:10px;
top:10px;
background:#1b1b1b;
border:1px solid #333;
padding:10px;
color:#fff;
border-radius:8px;
font-size:13px;
}

canvas{
display:block;
image-rendering:pixelated;
}
</style>
</head>

<body>

<div id="toolbar">
<button id="adminBtn">Admin</button>
<button id="removeBtn" style="display:none;">Rimuovi</button>
<div id="info"></div>
</div>

<div id="coords">X:0<br>Y:0</div>

<canvas id="canvas"></canvas>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

/* ================= FIREBASE ================= */
firebase.initializeApp({
apiKey:"AIzaSyDFPiQn3Uq7_OA0e7UxNoeze8z_EfndwsU",
authDomain:"pixel-wall-ff621.firebaseapp.com",
projectId:"pixel-wall-ff621"
});

const db=firebase.firestore();

/* ================= WORLD ================= */
const W=1280,H=720;

/* ================= CANVAS ================= */
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
ctx.imageSmoothingEnabled=false;

canvas.width=innerWidth;
canvas.height=innerHeight;

/* ================= STATE ================= */
let scale=1;
let offsetX=0;
let offsetY=0;

let admin=false;
let blocks=[];
let selectedId=null;

/* ================= CENTER ================= */
function center(){
offsetX=(canvas.width-W*scale)/2;
offsetY=(canvas.height-H*scale)/2;
}

/* ================= LOAD ================= */
db.collection("pixelwall").doc("main").onSnapshot(d=>{
blocks=d.data()?.blocks||[];
draw();
});

/* ================= SAVE (SAFE) ================= */
function save(){
db.collection("pixelwall").doc("main").set({
blocks:blocks
},{merge:true});
}

/* ================= DRAW ================= */
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.save();
ctx.translate(offsetX,offsetY);
ctx.scale(scale,scale);

/* world */
ctx.fillStyle="#151515";
ctx.fillRect(0,0,W,H);

/* blocks */
for(let b of blocks){

if(!b._img){
b._img=new Image();
b._img.src=b.img;
}

ctx.drawImage(b._img,b.x,b.y,b.w,b.h);

if(b.id===selectedId){
ctx.strokeStyle="red";
ctx.lineWidth=2/scale;
ctx.strokeRect(b.x,b.y,b.w,b.h);
}

}

ctx.strokeStyle="#333";
ctx.strokeRect(0,0,W,H);

ctx.restore();

}

/* ================= COORDS ================= */
function worldPos(e){
const r=canvas.getBoundingClientRect();
return {
x:(e.clientX-r.left-offsetX)/scale,
y:(e.clientY-r.top-offsetY)/scale
};
}

/* ================= CLICK SELECT ================= */
canvas.addEventListener("click",(e)=>{

const p=worldPos(e);

selectedId=null;

for(let i=blocks.length-1;i>=0;i--){
let b=blocks[i];

if(
p.x>=b.x &&
p.x<=b.x+b.w &&
p.y>=b.y &&
p.y<=b.y+b.h
){
selectedId=b.id;
break;
}
}

draw();

});

/* ================= REMOVE (FIX DEFINITIVO) ================= */
document.getElementById("removeBtn").onclick=()=>{

if(!selectedId)return;

blocks=blocks.filter(b=>b.id!==selectedId);

selectedId=null;

save();
draw();

};

/* ================= ADMIN ================= */
document.getElementById("adminBtn").onclick=()=>{

const p=prompt("admin");

if(p==="admin123"){
admin=!admin;
document.getElementById("removeBtn").style.display=
admin?"block":"none";
}

};

/* ================= INIT ================= */
center();
draw();

window.addEventListener("resize",()=>{
canvas.width=innerWidth;
canvas.height=innerHeight;
center();
draw();
});

</script>

</body>
</html>
