<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Wall Live - Preview Mode</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{ overflow:hidden; background:#0f0f0f; font-family:Arial; }
        
        #toolbar{ 
            position:fixed; top:10px; left:10px; z-index:9999; 
            display:flex; flex-direction:column; gap:10px;
        }

        .ui-box {
            background:rgba(27,27,27,0.9); color:#fff; border:1px solid #444; 
            padding:15px; border-radius:12px; backdrop-filter: blur(5px);
        }

        #previewPanel { display: none; flex-direction: column; gap:8px; width: 220px; }
        
        .input-group { display: flex; justify-content: space-between; align-items: center; gap: 5px; }
        input { 
            width: 60px; background: #111; border: 1px solid #555; 
            color: lime; padding: 4px; border-radius: 4px; text-align: center;
        }

        button{ 
            background:#333; color:#fff; border:1px solid #555; 
            padding:10px; border-radius:8px; cursor:pointer; font-weight: bold;
        }
        button:hover { background: #444; }

        canvas{ display:block; touch-action:none; image-rendering:pixelated; cursor: crosshair; }
    </style>
</head>
<body>

<div id="toolbar">
    <div class="ui-box">
        <button id="resetBtn">Reset Vista</button>
        <p style="font-size: 10px; margin-top: 8px; color: #888;">Clicca sul muro per misurare</p>
    </div>

    <div id="previewPanel" class="ui-box">
        <h4 style="color: lime; font-size: 14px; margin-bottom: 5px;">Anteprima Spazio</h4>
        <div class="input-group">X: <input type="number" id="ux"> Y: <input type="number" id="uy"></div>
        <div class="input-group">W: <input type="number" id="uw"> H: <input type="number" id="uh"></div>
        <p style="font-size: 11px; color: #aaa; margin-top: 5px;">Regola i valori per vedere l'area</p>
        <button onclick="document.getElementById('previewPanel').style.display='none'">Chiudi</button>
    </div>
</div>

<canvas id="c"></canvas>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({ apiKey:"AIzaSyDFPiQn3Uq7_OA0e7UxNoeze8z_EfndwsU", authDomain:"pixel-wall-ff621.firebaseapp.com", projectId:"pixel-wall-ff621" });
const db = firebase.firestore();
const W=1280, H=720;
const c = document.getElementById("c");
const ctx = c.getContext("2d");
let scale = 1, ox = 0, oy = 0, blocks = [];
const cache = {};

// Stato Anteprima
let preview = { x: 0, y: 0, w: 50, h: 50, active: false };

function resize() { c.width = innerWidth; c.height = innerHeight; }
resize();

db.collection("blocks").onSnapshot(snapshot => {
    blocks = snapshot.docs.map(doc => doc.data());
});

function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    ctx.save();
    ctx.translate(ox, oy);
    ctx.scale(scale, scale);
    
    // Sfondo e Griglia
    ctx.fillStyle = "#151515"; ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = "#222"; ctx.lineWidth = 1/scale;
    for(let x=0; x<=W; x+=10) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for(let y=0; y<=H; y+=10) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(y,W); ctx.stroke(); } // Errore corretto qui (era LineTo(W,y))
    for(let y=0; y<=H; y+=10) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

    // Disegno Blocchi Esistenti
    for(let b of blocks) {
        if(!cache[b.img]) { let img = new Image(); img.src = b.img; cache[b.img] = img; }
        if(cache[b.img].complete) ctx.drawImage(cache[b.img], b.x, b.y, b.w, b.h);
    }

    // DISEGNO ANTEPRIMA UTENTE
    if(preview.active) {
        ctx.fillStyle = "rgba(0, 255, 0, 0.3)";
        ctx.strokeStyle = "lime";
        ctx.lineWidth = 2/scale;
        ctx.fillRect(preview.x, preview.y, preview.w, preview.h);
        ctx.strokeRect(preview.x, preview.y, preview.w, preview.h);
    }

    ctx.restore();
}

function loop() { draw(); requestAnimationFrame(loop); }
loop();

function getPos(e) {
    const r = c.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: Math.floor((cx - r.left - ox) / scale), y: Math.floor((cy - r.top - oy) / scale) };
}

// Eventi
let dragging = false, lx = 0, ly = 0;

c.addEventListener("mousedown", e => { dragging = false; lx = e.clientX; ly = e.clientY; });
c.addEventListener("mousemove", e => {
    if(Math.abs(e.clientX - lx) > 5 || Math.abs(e.clientY - ly) > 5) dragging = true;
    if(dragging) { ox += e.clientX - lx; oy += e.clientY - ly; lx = e.clientX; ly = e.clientY; }
});

c.addEventListener("click", e => {
    if(dragging) return; // Se stava trascinando la mappa, non selezionare
    const p = getPos(e);
    
    // Attiva anteprima nel punto cliccato
    preview.active = true;
    preview.x = p.x;
    preview.y = p.y;
    
    // Aggiorna Input
    document.getElementById("ux").value = preview.x;
    document.getElementById("uy").value = preview.y;
    document.getElementById("uw").value = preview.w;
    document.getElementById("uh").value = preview.h;
    
    document.getElementById("previewPanel").style.display = "flex";
});

// Listener per aggiornare l'anteprima dai box di testo
["ux", "uy", "uw", "uh"].forEach(id => {
    document.getElementById(id).addEventListener("input", (e) => {
        preview[id.replace("u", "")] = parseInt(e.target.value) || 0;
    });
});

c.addEventListener("wheel", e => { e.preventDefault(); scale *= e.deltaY < 0 ? 1.1 : 0.9; scale = Math.max(0.1, Math.min(50, scale)); }, {passive: false});

document.getElementById("resetBtn").onclick = () => { scale = 1; ox = (c.width - W)/2; oy = (c.height - H)/2; };
window.addEventListener("resize", resize);
</script>
</body>
</html>
