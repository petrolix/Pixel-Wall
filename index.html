<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Pixel Wall</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#0f0f0f;
font-family:Arial;
}

#toolbar{
position:fixed;
top:10px;
left:10px;
z-index:9999;
display:flex;
gap:10px;
align-items:center;
flex-wrap:wrap;
background:#1b1b1b;
padding:10px;
border-radius:10px;
border:1px solid #333;
}

button,
input{

background:#222;
color:#fff;
border:1px solid #444;

padding:8px 12px;

border-radius:8px;

}

button{
cursor:pointer;
}

button:hover{
background:#333;
}

input{
width:80px;
}

#info{
color:#fff;
font-size:14px;
}

#coords{

position:fixed;
right:10px;
top:10px;
z-index:99999;
background:#1b1b1b;
border:1px solid #333;
padding:12px;
border-radius:10px;
color:#fff;
font-size:14px;
min-width:240px;
line-height:1.5;
}

#coords button{
margin-top:8px;
width:100%;
}

/* MANUAL PANEL */
#manualPanel{

position:fixed;
left:50%;
top:50%;
transform:translate(-50%,-50%);
z-index:100000;

background:#1b1b1b;
border:1px solid #333;
padding:20px;
border-radius:12px;

display:none;
flex-direction:column;
gap:10px;

min-width:280px;
}

#manualPanel h3{
color:#fff;
margin-bottom:10px;
}

#manualPanel input{
width:100%;
}

canvas{
display:block;
cursor:grab;
image-rendering: pixelated;
touch-action:none;
}

canvas:active{
cursor:grabbing;
}

</style>
</head>

<body>

<div id="toolbar">

<button id="adminBtn">Admin</button>

<button id="removeBtn" style="display:none;">Rimuovi</button>

<button id="resetBtn">Reset</button>

<input type="number" id="searchX" placeholder="X">
<input type="number" id="searchY" placeholder="Y">
<button id="gotoBtn">Vai</button>

<!-- SOLO ADMIN -->
<button id="manualBtn" style="display:none;">
Inserimento Manuale
</button>

<div id="info"></div>

</div>

<div id="coords">Coordinate</div>

<!-- MANUAL PANEL -->
<div id="manualPanel">

<h3>Inserimento Manuale</h3>

<input type="number" id="manualX" placeholder="X">
<input type="number" id="manualY" placeholder="Y">
<input type="number" id="manualW" placeholder="Larghezza">
<input type="number" id="manualH" placeholder="Altezza">

<button id="manualUploadBtn">Carica Immagine</button>
<button id="manualCloseBtn">Chiudi</button>

</div>

<input type="file" id="imageInput" accept="image/*" hidden>
<input type="file" id="manualImageInput" accept="image/*" hidden>

<canvas id="canvas"></canvas>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

/* ================= FIREBASE ================= */

const firebaseConfig = {
apiKey: "AIzaSyDFPiQn3Uq7_OA0e7UxNoeze8z_EfndwsU",
authDomain: "pixel-wall-ff621.firebaseapp.com",
projectId: "pixel-wall-ff621",
storageBucket: "pixel-wall-ff621.firebasestorage.app",
messagingSenderId: "623723716677",
appId: "1:623723716677:web:4c22d403e1251ef0e9432c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ================= CLOUDINARY ================= */

const CLOUD_NAME = "dkwijnvsl";
const UPLOAD_PRESET = "pixelwall";

/* ================= CANVAS ================= */

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

ctx.imageSmoothingEnabled = false;

canvas.width = innerWidth;
canvas.height = innerHeight;

/* ================= DOM ================= */

const adminBtn = document.getElementById("adminBtn");
const removeBtn = document.getElementById("removeBtn");
const resetBtn = document.getElementById("resetBtn");

const manualBtn = document.getElementById("manualBtn");
const manualPanel = document.getElementById("manualPanel");
const manualCloseBtn = document.getElementById("manualCloseBtn");
const manualUploadBtn = document.getElementById("manualUploadBtn");
const manualImageInput = document.getElementById("manualImageInput");

const manualX = document.getElementById("manualX");
const manualY = document.getElementById("manualY");
const manualW = document.getElementById("manualW");
const manualH = document.getElementById("manualH");

const searchX = document.getElementById("searchX");
const searchY = document.getElementById("searchY");
const gotoBtn = document.getElementById("gotoBtn");

const coords = document.getElementById("coords");
const info = document.getElementById("info");

/* ================= WORLD ================= */

const WORLD_W = 1280;
const WORLD_H = 720;
const CELL = 1;

/* ================= STATE ================= */

let scale = 1;
let offsetX = 0;
let offsetY = 0;

let admin = false;

let blocks = [];

let selectStart = null;
let selectEnd = null;

let selectedBlock = -1;

let hoverPixelX = 0;
let hoverPixelY = 0;

let lockedPixel = null;

/* ================= ADMIN UI ================= */

function updateAdminUI(){

manualBtn.style.display = admin ? "inline-block" : "none";

removeBtn.style.display =
(admin && selectedBlock >= 0)
? "inline-block"
: "none";

}

/* ================= FIREBASE ================= */

db.collection("pixelwall")
.doc("main")
.onSnapshot((doc)=>{

blocks = doc.data()?.blocks || [];

requestAnimationFrame(draw);

});

/* ================= SAVE ================= */

function saveCloud(){

db.collection("pixelwall")
.doc("main")
.set({blocks});

}

/* ================= GOTO ================= */

gotoBtn.onclick = ()=>{

const x = parseInt(searchX.value);
const y = parseInt(searchY.value);

if(isNaN(x)||isNaN(y)) return;

offsetX = canvas.width/2 - x*scale;
offsetY = canvas.height/2 - y*scale;

draw();

};

/* ================= MANUAL ================= */

manualBtn.onclick = ()=>{
manualPanel.style.display = "flex";
};

manualCloseBtn.onclick = ()=>{
manualPanel.style.display = "none";
};

manualUploadBtn.onclick = async ()=>{

manualImageInput.click();

};

manualImageInput.onchange = async (e)=>{

const file = e.target.files[0];
if(!file) return;

const x = parseInt(manualX.value)||0;
const y = parseInt(manualY.value)||0;
const w = parseInt(manualW.value)||1;
const h = parseInt(manualH.value)||1;

/* CLOUDINARY */

const form = new FormData();
form.append("file",file);
form.append("upload_preset",UPLOAD_PRESET);

const res = await fetch(
`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
{method:"POST",body:form}
);

const data = await res.json();

if(!data.secure_url){
alert("Errore upload");
return;
}

blocks.push({
img:data.secure_url,
x,y,
w,h
});

saveCloud();
manualPanel.style.display="none";
draw();

};

/* ================= ADMIN ================= */

adminBtn.onclick = ()=>{

const p = prompt("Password admin");

if(p==="admin123"){
admin = !admin;
adminBtn.innerText = admin ? "Admin ON" : "Admin OFF";
updateAdminUI();
draw();
}

};

/* ================= DRAW ================= */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.save();
ctx.translate(offsetX,offsetY);
ctx.scale(scale,scale);

/* BACKGROUND */
ctx.fillStyle="#151515";
ctx.fillRect(0,0,WORLD_W,WORLD_H);

/* BLOCKS */
for(let b of blocks){

let img = new Image();
img.src = b.img;

ctx.drawImage(img,b.x,b.y,b.w,b.h);

}

/* HOVER */
ctx.strokeStyle="#00ff88";
ctx.strokeRect(hoverPixelX,hoverPixelY,1,1);

ctx.restore();

info.innerText =
`Blocchi: ${blocks.length}`;

}

/* ================= INPUT ================= */

canvas.addEventListener("mousemove",(e)=>{

const rect = canvas.getBoundingClientRect();

hoverPixelX = Math.floor((e.clientX-rect.left-offsetX)/scale);
hoverPixelY = Math.floor((e.clientY-rect.top-offsetY)/scale);

coords.innerHTML = `
X: ${hoverPixelX}<br>
Y: ${hoverPixelY}
`;

draw();

});

/* ================= INIT ================= */

draw();

</script>

</body>
</html>
