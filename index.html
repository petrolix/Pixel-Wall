<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Wall - Master Suite</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body { 
            overflow:hidden; background:#0a0a0a; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            display: flex; flex-direction: column; height: 100vh;
        }

        header {
            background: #1a1a1a; color: white; padding: 10px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #333; z-index: 10000;
        }

        .controls-group { display: flex; align-items: center; gap: 12px; }

        /* Toggle Modalità */
        .mode-toggle {
            display: flex; background: #000; padding: 3px; border-radius: 8px; border: 1px solid #444;
        }
        .mode-btn {
            background: transparent; color: #666; border: none; padding: 6px 12px;
            border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold;
        }
        .mode-btn.active { background: #333; color: lime; }

        #selectionUI {
            display: flex; align-items: center; gap: 10px;
            background: #252525; padding: 5px 12px; border-radius: 8px;
            border: 1px solid #444; visibility: hidden;
        }
        #selectionUI.active { visibility: visible; border-color: lime; }

        .input-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #888; }
        input {
            width: 50px; background: #000; border: 1px solid #555; 
            color: lime; padding: 3px; border-radius: 4px; text-align: center;
        }

        button {
            background: #333; color: #eee; border: 1px solid #555; 
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
        }
        .btn-red { color: #f88; }
        .btn-red:hover { background: #400; color: #fff; }

        #canvas-container { flex-grow: 1; position: relative; overflow: hidden; }
        /* Il cursore cambia in base alla modalità */
        canvas.mode-pan { cursor: grab; }
        canvas.mode-pan:active { cursor: grabbing; }
        canvas.mode-select { cursor: crosshair; }
    </style>
</head>
<body>

<header>
    <div class="controls-group">
        <div class="mode-toggle">
            <button id="modePan" class="mode-btn active">NAVIGA</button>
            <button id="modeSelect" class="mode-btn">SELEZIONA</button>
        </div>
        <button id="resetBtn">Centra</button>
        <span id="coords-label" style="font-family: monospace; color: #555; font-size: 12px;">X:0 Y:0</span>
    </div>

    <div id="selectionUI">
        <div class="input-item">X <input type="number" id="ux"></div>
        <div class="input-item">Y <input type="number" id="uy"></div>
        <div class="input-item">W <input type="number" id="uw"></div>
        <div class="input-item">H <input type="number" id="uh"></div>
        <button id="clearSelBtn" class="btn-red">Annulla</button>
    </div>
</header>

<div id="canvas-container">
    <canvas id="c" class="mode-pan"></canvas>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({ apiKey:"AIzaSyDFPiQn3Uq7_OA0e7UxNoeze8z_EfndwsU", authDomain:"pixel-wall-ff621.firebaseapp.com", projectId:"pixel-wall-ff621" });
const db = firebase.firestore();
const W = 1280, H = 720, c = document.getElementById("c"), ctx = c.getContext("2d");
const selUI = document.getElementById("selectionUI");

let scale = 1, ox = 0, oy = 0, blocks = [], cache = {};
let preview = { x: 0, y: 0, w: 0, h: 0, active: false };
let currentMode = 'pan'; // 'pan' o 'select'

function resize() {
    const r = document.getElementById("canvas-container").getBoundingClientRect();
    c.width = r.width; c.height = r.height;
}
window.addEventListener("resize", resize);
resize();

db.collection("blocks").onSnapshot(s => { blocks = s.docs.map(d => d.data()); });

function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    ctx.save();
    ctx.translate(Math.round(ox), Math.round(oy));
    ctx.scale(scale, scale);
    
    ctx.fillStyle = "#111"; ctx.fillRect(0, 0, W, H);

    if (scale > 8) {
        ctx.beginPath(); ctx.strokeStyle = "rgba(255,255,255,0.1)"; ctx.lineWidth = 1/scale;
        for(let x=0; x<=W; x++) { ctx.moveTo(x,0); ctx.lineTo(x,H); }
        for(let y=0; y<=H; y++) { ctx.moveTo(0,y); ctx.lineTo(W,y); }
        ctx.stroke();
    }

    for(let b of blocks) {
        if(!cache[b.img]) { cache[b.img] = new Image(); cache[b.img].src = b.img; }
        if(cache[b.img].complete) ctx.drawImage(cache[b.img], b.x, b.y, b.w, b.h);
    }

    if(preview.active) {
        ctx.fillStyle = "rgba(0, 255, 0, 0.2)"; ctx.strokeStyle = "lime";
        ctx.lineWidth = 2/scale;
        ctx.fillRect(preview.x, preview.y, preview.w, preview.h);
        ctx.strokeRect(preview.x, preview.y, preview.w, preview.h);
    }
    ctx.restore();
}
function loop() { draw(); requestAnimationFrame(loop); }
loop();

/* ================= GESTIONE INPUT ================= */
let isAction = false, startPos = {x:0, y:0}, lastM = {x:0, y:0};

// Cambio Modalità
document.getElementById("modePan").onclick = () => setMode('pan');
document.getElementById("modeSelect").onclick = () => setMode('select');

function setMode(m) {
    currentMode = m;
    document.getElementById("modePan").classList.toggle("active", m === 'pan');
    document.getElementById("modeSelect").classList.toggle("active", m === 'select');
    c.className = m === 'pan' ? 'mode-pan' : 'mode-select';
}

c.addEventListener("pointerdown", e => {
    const r = c.getBoundingClientRect();
    const wp = {
        x: Math.floor((e.clientX - r.left - ox) / scale),
        y: Math.floor((e.clientY - r.top - oy) / scale)
    };

    // CONTROLLO COLLISIONE: Non selezionare se clicchi su un'immagine
    const hit = blocks.some(b => wp.x >= b.x && wp.x < b.x + b.w && wp.y >= b.y && wp.y < b.y + b.h);

    if (currentMode === 'select' && !hit && wp.x >= 0 && wp.x < W && wp.y >= 0 && wp.y < H) {
        isAction = true; startPos = wp;
        updatePreview(wp.x, wp.y, 1, 1);
    } else if (currentMode === 'pan' || hit) {
        isAction = true; lastM = { x: e.clientX, y: e.clientY };
    }
});

window.addEventListener("pointermove", e => {
    const r = c.getBoundingClientRect();
    const cw = {
        x: Math.floor((e.clientX - r.left - ox) / scale),
        y: Math.floor((e.clientY - r.top - oy) / scale)
    };
    document.getElementById("coords-label").innerText = `X:${cw.x} Y:${cw.y}`;

    if (!isAction) return;

    if (currentMode === 'select' && !isPanningInstead) {
        let x1 = Math.max(0, Math.min(startPos.x, cw.x));
        let y1 = Math.max(0, Math.min(startPos.y, cw.y));
        let x2 = Math.min(W, Math.max(startPos.x, cw.x) + 1);
        let y2 = Math.min(H, Math.max(startPos.y, cw.y) + 1);
        updatePreview(x1, y1, x2 - x1, y2 - y1);
    } else {
        ox += e.clientX - lastM.x;
        oy += e.clientY - lastM.y;
        lastM = { x: e.clientX, y: e.clientY };
    }
});

// Variabile di supporto per evitare conflitti durante il drag
let isPanningInstead = false;

window.addEventListener("pointerup", () => { isAction = false; isPanningInstead = false; });

function updatePreview(x, y, w, h) {
    preview.x = x; preview.y = y; preview.w = w; preview.h = h;
    preview.active = true;
    selUI.style.visibility = "visible";
    selUI.classList.add("active");
    document.getElementById("ux").value = x; document.getElementById("uy").value = y;
    document.getElementById("uw").value = w; document.getElementById("uh").value = h;
}

document.getElementById("clearSelBtn").onclick = () => {
    preview.active = false; selUI.style.visibility = "hidden"; selUI.classList.remove("active");
};

/* ================= ZOOM ================= */
c.addEventListener("wheel", e => {
    e.preventDefault();
    const s = e.deltaY < 0 ? 1.1 : 0.9;
    scale = Math.max(0.1, Math.min(60, scale * s));
}, {passive: false});

document.getElementById("resetBtn").onclick = () => {
    scale = 1; ox = (c.width - W)/2; oy = (c.height - H)/2;
};
window.onload = () => { ox = (c.width - W)/2; oy = (c.height - H)/2; };
</script>
</body>
</html>
