<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pixel Wall</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
overflow:hidden;
background:#0f0f0f;
font-family:Arial;
}

#toolbar{
position:fixed;
top:10px;
left:10px;
z-index:9999;
display:flex;
gap:10px;
align-items:center;
flex-wrap:wrap;
background:#1b1b1b;
padding:10px;
border-radius:10px;
border:1px solid #333;
}

button,input{
background:#222;
color:#fff;
border:1px solid #444;
padding:8px 12px;
border-radius:8px;
}

button{cursor:pointer;}
button:hover{background:#333;}

#info{
color:#fff;
font-size:14px;
}

#coords{
position:fixed;
right:10px;
top:10px;
background:#1b1b1b;
border:1px solid #333;
padding:10px;
color:#fff;
border-radius:8px;
font-size:13px;
}

#manualPanel{
position:fixed;
left:50%;
top:50%;
transform:translate(-50%,-50%);
background:#1b1b1b;
border:1px solid #333;
padding:20px;
border-radius:10px;
display:none;
flex-direction:column;
gap:10px;
z-index:99999;
}

canvas{
display:block;
cursor:grab;
image-rendering:pixelated;
touch-action:none;
}
canvas:active{cursor:grabbing;}
</style>
</head>

<body>

<div id="toolbar">
<button id="adminBtn">Admin</button>
<button id="resetBtn">Reset</button>
<button id="manualBtn" style="display:none;">Inserimento Manuale</button>
<div id="info"></div>
</div>

<div id="coords">X:0<br>Y:0</div>

<div id="manualPanel">
<input id="mx" placeholder="X">
<input id="my" placeholder="Y">
<input id="mw" placeholder="W">
<input id="mh" placeholder="H">
<input type="file" id="file">
<button id="add">Inserisci</button>
<button id="close">Chiudi</button>
</div>

<canvas id="canvas"></canvas>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

/* ================= FIREBASE ================= */
firebase.initializeApp({
apiKey:"AIzaSyDFPiQn3Uq7_OA0e7UxNoeze8z_EfndwsU",
authDomain:"pixel-wall-ff621.firebaseapp.com",
projectId:"pixel-wall-ff621"
});

const db=firebase.firestore();

/* ================= CLOUDINARY ================= */
const CLOUD_NAME="dkwijnvsl";
const UPLOAD_PRESET="pixelwall";

/* ================= WORLD ================= */
const W=1280,H=720;

/* ================= CANVAS ================= */
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
ctx.imageSmoothingEnabled=false;

canvas.width=innerWidth;
canvas.height=innerHeight;

/* ================= STATE ================= */
let scale=1;
let offsetX=0;
let offsetY=0;

let admin=false;
let blocks=[];

/* ================= UI ================= */
const info=document.getElementById("info");
const coords=document.getElementById("coords");

/* ================= CENTER ================= */
function center(){
offsetX=(canvas.width-W*scale)/2;
offsetY=(canvas.height-H*scale)/2;
}

/* ================= FIREBASE LOAD ================= */
db.collection("pixelwall").doc("main").onSnapshot(d=>{
blocks=d.data()?.blocks||[];
draw();
});

/* ================= SAVE ================= */
function save(){
db.collection("pixelwall").doc("main").set({blocks});
}

/* ================= DRAW ================= */
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.save();
ctx.translate(offsetX,offsetY);
ctx.scale(scale,scale);

/* world */
ctx.fillStyle="#151515";
ctx.fillRect(0,0,W,H);

/* blocks */
for(let b of blocks){
let img=new Image();
img.src=b.img;
ctx.drawImage(img,b.x,b.y,b.w,b.h);
}

/* border */
ctx.strokeStyle="#333";
ctx.strokeRect(0,0,W,H);

ctx.restore();

info.innerText=`Zoom ${(scale*100).toFixed(0)}% | Blocchi ${blocks.length}`;
}

/* ================= POINTER ================= */
function pos(e){
const r=canvas.getBoundingClientRect();
return {
x:(e.clientX-r.left-offsetX)/scale,
y:(e.clientY-r.top-offsetY)/scale
};
}

/* ================= MOUSE COORDS ================= */
canvas.addEventListener("mousemove",(e)=>{
const p=pos(e);
coords.innerHTML=`X:${Math.floor(p.x)}<br>Y:${Math.floor(p.y)}`;
});

/* ================= ZOOM ================= */
canvas.addEventListener("wheel",(e)=>{
e.preventDefault();

const before=pos(e);

scale*=e.deltaY<0?1.1:0.9;
scale=Math.max(0.2,Math.min(50,scale));

const after=pos(e);

offsetX+=(after.x-before.x)*scale;
offsetY+=(after.y-before.y)*scale;

draw();
},{passive:false});

/* ================= RESET ================= */
document.getElementById("resetBtn").onclick=()=>{
scale=1;
center();
draw();
};

/* ================= ADMIN ================= */
document.getElementById("adminBtn").onclick=()=>{
const p=prompt("admin");
if(p==="admin123"){
admin=!admin;
document.getElementById("manualBtn").style.display=admin?"block":"none";
}
};

/* ================= MANUAL ================= */
const panel=document.getElementById("manualPanel");

document.getElementById("manualBtn").onclick=()=>panel.style.display="flex";
document.getElementById("close").onclick=()=>panel.style.display="none";

/* ================= INSERT ================= */
document.getElementById("add").onclick=async()=>{

const file=document.getElementById("file").files[0];
if(!file)return;

const x=parseInt(document.getElementById("mx").value)||0;
const y=parseInt(document.getElementById("my").value)||0;
const w=parseInt(document.getElementById("mw").value)||1;
const h=parseInt(document.getElementById("mh").value)||1;

/* CLOUDINARY */
const form=new FormData();
form.append("file",file);
form.append("upload_preset",UPLOAD_PRESET);

const res=await fetch(
`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
{method:"POST",body:form}
);

const data=await res.json();

if(!data.secure_url){
alert("errore upload");
return;
}

blocks.push({
img:data.secure_url,
x,y,w,h
});

save();
panel.style.display="none";
draw();
};

/* ================= INIT ================= */
center();
draw();

window.addEventListener("resize",()=>{
canvas.width=innerWidth;
canvas.height=innerHeight;
center();
draw();
});

</script>

</body>
</html>
