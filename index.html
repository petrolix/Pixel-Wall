<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Wall - Stats & Pro Zoom</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box; touch-action: none; }
        body { 
            overflow:hidden; background:#0a0a0a; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            display: flex; flex-direction: column; height: 100vh;
            position: fixed; width: 100%; 
        }

        header {
            background: #1a1a1a; color: white; padding: 8px 15px;
            display: flex; flex-direction: column; gap: 8px;
            border-bottom: 1px solid #333; z-index: 10000;
        }

        .top-row, .stats-row { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        
        .controls-group { display: flex; align-items: center; gap: 10px; }
        
        /* Stile Statistiche */
        .stats-row { 
            font-family: monospace; font-size: 11px; color: #888; 
            background: #000; padding: 4px 10px; border-radius: 6px; border: 1px solid #222;
        }
        .stat-item b { color: lime; }
        .stat-item.total b { color: #555; }
        .stat-item.free b { color: #00ffcc; }

        .mode-toggle { display: flex; background: #000; padding: 2px; border-radius: 8px; border: 1px solid #444; }
        .mode-btn {
            background: transparent; color: #666; border: none; padding: 6px 10px;
            border-radius: 6px; cursor: pointer; font-size: 10px; font-weight: bold;
        }
        .mode-btn.active { background: #333; color: lime; }

        #zoom-level { font-family: monospace; font-size: 11px; color: lime; min-width: 40px; text-align: center; }

        #selectionUI {
            display: flex; align-items: center; gap: 8px; visibility: hidden;
        }
        input { width: 45px; background: #000; border: 1px solid #555; color: lime; padding: 3px; border-radius: 4px; text-align: center; font-size: 11px; }
        
        #canvas-container { flex-grow: 1; position: relative; overflow: hidden; background: #000; }
        canvas { display: block; image-rendering: pixelated; }
    </style>
</head>
<body>

<header>
    <div class="top-row">
        <div class="controls-group">
            <div class="mode-toggle">
                <button id="modePan" class="mode-btn active">NAVIGA</button>
                <button id="modeSelect" class="mode-btn">SELEZIONA</button>
            </div>
            <div style="display:flex; align-items:center; gap:5px;">
                <button id="zoomOut" style="background:#333; color:white; border:1px solid #444; padding:2px 8px; border-radius:4px;">-</button>
                <span id="zoom-level">100%</span>
                <button id="zoomIn" style="background:#333; color:white; border:1px solid #444; padding:2px 8px; border-radius:4px;">+</button>
            </div>
            <button id="resetBtn" style="background:#333; color:white; border:1px solid #444; padding:4px 8px; border-radius:4px; font-size:10px;">RESET</button>
        </div>

        <div id="selectionUI">
            <input type="number" id="ux"> <input type="number" id="uy">
            <input type="number" id="uw"> <input type="number" id="uh">
            <button id="clearSelBtn" style="color:#f88; background:none; border:none; font-weight:bold;">X</button>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-item free">Disponibili: <b id="statFree">0</b></div>
        <div class="stat-item">Occupati: <b id="statUsed">0</b></div>
        <div class="stat-item total">Totali: <b id="statTotal">0</b></div>
        <div id="coords-label" style="color:#555;">X:0 Y:0</div>
    </div>
</header>

<div id="canvas-container"><canvas id="c"></canvas></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({ apiKey:"AIzaSyDFPiQn3Uq7_OA0e7UxNoeze8z_EfndwsU", authDomain:"pixel-wall-ff621.firebaseapp.com", projectId:"pixel-wall-ff621" });
const db = firebase.firestore();
const W = 1280, H = 720, c = document.getElementById("c"), ctx = c.getContext("2d");
const selUI = document.getElementById("selectionUI"), zoomLabel = document.getElementById("zoom-level");

let scale = 1, ox = 0, oy = 0, blocks = [], cache = {};
let preview = { x: 0, y: 0, w: 0, h: 0, active: false };
let currentMode = 'pan';

function resize() {
    const r = document.getElementById("canvas-container").getBoundingClientRect();
    c.width = r.width; c.height = r.height;
}
window.addEventListener("resize", resize);
resize();

// Aggiorna blocchi e statistiche
db.collection("blocks").onSnapshot(s => { 
    blocks = s.docs.map(d => d.data()); 
    updateStats();
});

function updateStats() {
    const total = W * H;
    let used = 0;
    blocks.forEach(b => used += (b.w * b.h));
    document.getElementById("statTotal").innerText = total.toLocaleString();
    document.getElementById("statUsed").innerText = used.toLocaleString();
    document.getElementById("statFree").innerText = (total - used).toLocaleString();
}

function updateZoomUI() { zoomLabel.innerText = Math.round(scale * 100) + "%"; }

function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    ctx.save();
    ctx.translate(Math.round(ox), Math.round(oy));
    ctx.scale(scale, scale);
    ctx.fillStyle = "#111"; ctx.fillRect(0, 0, W, H);
    
    if (scale > 8) {
        ctx.beginPath(); ctx.strokeStyle = "rgba(255,255,255,0.1)"; ctx.lineWidth = 1/scale;
        for(let x=0; x<=W; x++) { ctx.moveTo(x,0); ctx.lineTo(x,H); }
        for(let y=0; y<=H; y++) { ctx.moveTo(0,y); ctx.lineTo(W,y); }
        ctx.stroke();
    }
    for(let b of blocks) {
        if(!cache[b.img]) { cache[b.img] = new Image(); cache[b.img].src = b.img; }
        if(cache[b.img].complete) ctx.drawImage(cache[b.img], b.x, b.y, b.w, b.h);
    }
    if(preview.active) {
        ctx.fillStyle = "rgba(0, 255, 0, 0.2)"; ctx.strokeStyle = "lime";
        ctx.lineWidth = 2/scale; ctx.fillRect(preview.x, preview.y, preview.w, preview.h);
        ctx.strokeRect(preview.x, preview.y, preview.w, preview.h);
    }
    ctx.restore();
}
function loop() { draw(); requestAnimationFrame(loop); }
loop();

/* ================= ZOOM AL CENTRO ================= */
function applyZoom(s, centerX, centerY) {
    const newScale = Math.max(0.1, Math.min(60, scale * s));
    // Calcola la posizione relativa del mouse/centro rispetto all'origine del mondo
    const worldX = (centerX - ox) / scale;
    const worldY = (centerY - oy) / scale;
    
    scale = newScale;
    
    // Riposiziona l'origine in modo che il punto worldX/Y resti sotto il cursore
    ox = centerX - worldX * scale;
    oy = centerY - worldY * scale;
    
    updateZoomUI();
}

c.addEventListener("wheel", e => {
    e.preventDefault();
    const s = e.deltaY < 0 ? 1.1 : 0.9;
    applyZoom(s, e.clientX, e.clientY);
}, {passive: false});

document.getElementById("zoomIn").onclick = () => applyZoom(1.2, c.width/2, c.height/2);
document.getElementById("zoomOut").onclick = () => applyZoom(0.8, c.width/2, c.height/2);

/* ================= LOGICA TOUCH & DRAG ================= */
let evCache = [];
let prevDiff = -1;
let isMouseDown = false;
let startPos = {x:0, y:0}, lastM = {x:0, y:0};

c.onpointerdown = e => {
    evCache.push(e);
    isMouseDown = true;
    lastM = { x: e.clientX, y: e.clientY };
    const r = c.getBoundingClientRect();
    const wp = {
        x: Math.floor((e.clientX - r.left - ox) / scale),
        y: Math.floor((e.clientY - r.top - oy) / scale)
    };
    if (evCache.length === 1 && currentMode === 'select') {
        const hit = blocks.some(b => wp.x >= b.x && wp.x < b.x + b.w && wp.y >= b.y && wp.y < b.y + b.h);
        if (!hit && wp.x >= 0 && wp.x < W && wp.y >= 0 && wp.y < H) {
            startPos = wp;
            updatePreview(wp.x, wp.y, 1, 1);
        } else startPos = null;
    }
};

c.onpointermove = e => {
    const index = evCache.findIndex(ev => ev.pointerId === e.pointerId);
    if (index !== -1) evCache[index] = e;

    if (evCache.length === 2) {
        const curDiff = Math.hypot(evCache[0].clientX - evCache[1].clientX, evCache[0].clientY - evCache[1].clientY);
        const midX = (evCache[0].clientX + evCache[1].clientX) / 2;
        const midY = (evCache[0].clientY + evCache[1].clientY) / 2;
        if (prevDiff > 0) applyZoom(curDiff / prevDiff, midX, midY);
        prevDiff = curDiff;
        return;
    }

    if (isMouseDown && evCache.length === 1) {
        const r = c.getBoundingClientRect();
        const cw = {
            x: Math.floor((e.clientX - r.left - ox) / scale),
            y: Math.floor((e.clientY - r.top - oy) / scale)
        };
        if (currentMode === 'select' && startPos) {
            let x1 = Math.max(0, Math.min(startPos.x, cw.x)), y1 = Math.max(0, Math.min(startPos.y, cw.y));
            let x2 = Math.min(W, Math.max(startPos.x, cw.x) + 1), y2 = Math.min(H, Math.max(startPos.y, cw.y) + 1);
            if (!checkCollision(x1, y1, x2-x1, y2-y1)) updatePreview(x1, y1, x2-x1, y2-y1);
        } else {
            ox += e.clientX - lastM.x; oy += e.clientY - lastM.y;
            lastM = { x: e.clientX, y: e.clientY };
        }
        document.getElementById("coords-label").innerText = `X:${cw.x} Y:${cw.y}`;
    }
};

c.onpointerup = c.onpointercancel = e => {
    evCache = evCache.filter(ev => ev.pointerId !== e.pointerId);
    if (evCache.length < 2) prevDiff = -1;
    isMouseDown = false;
};

function setMode(m) {
    currentMode = m;
    document.getElementById("modePan").classList.toggle("active", m === 'pan');
    document.getElementById("modeSelect").classList.toggle("active", m === 'select');
    if (m === 'pan') { preview.active = false; selUI.style.visibility = "hidden"; }
}
document.getElementById("modePan").onclick = () => setMode('pan');
document.getElementById("modeSelect").onclick = () => setMode('select');
document.getElementById("clearSelBtn").onclick = () => { preview.active = false; selUI.style.visibility = "hidden"; };

function checkCollision(x, y, w, h) {
    return blocks.some(b => x < b.x + b.w && x + w > b.x && y < b.y + b.h && y + h > b.y);
}

function updatePreview(x, y, w, h) {
    preview = { x, y, w, h, active: true }; selUI.style.visibility = "visible";
    ux.value = x; uy.value = y; uw.value = w; uh.value = h;
}

document.getElementById("resetBtn").onclick = () => {
    scale = 1; ox = (c.width-W)/2; oy = (c.height-H)/2; updateZoomUI();
};
window.onload = () => { ox = (c.width-W)/2; oy = (c.height-H)/2; updateZoomUI(); };
</script>
</body>
</html>
