<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Wall Live</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{ overflow:hidden; background:#0f0f0f; font-family:Arial; }
        #toolbar{ position:fixed; top:10px; left:10px; z-index:9999; }
        button{ background:rgba(27,27,27,0.8); color:#fff; border:1px solid #444; padding:10px 15px; border-radius:10px; cursor:pointer; }
        canvas{ display:block; touch-action:none; image-rendering:pixelated; }
    </style>
</head>
<body>
<div id="toolbar"><button id="resetBtn">Reset View</button></div>
<canvas id="c"></canvas>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({ apiKey:"AIzaSyDFPiQn3Uq7_OA0e7UxNoeze8z_EfndwsU", authDomain:"pixel-wall-ff621.firebaseapp.com", projectId:"pixel-wall-ff621" });
const db = firebase.firestore();
const W=1280, H=720;
const c = document.getElementById("c");
const ctx = c.getContext("2d");
let scale = 1, ox = 0, oy = 0, blocks = [];
const cache = {};

function resize() { c.width = innerWidth; c.height = innerHeight; }
resize();

// LETTURA DA COLLEZIONE
db.collection("blocks").onSnapshot(snapshot => {
    blocks = snapshot.docs.map(doc => doc.data());
});

function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    ctx.save();
    ctx.translate(ox, oy);
    ctx.scale(scale, scale);
    
    // Sfondo
    ctx.fillStyle = "#151515"; 
    ctx.fillRect(0, 0, W, H);

    // --- AGGIUNTA GRIGLIA ---
    ctx.strokeStyle = "#222"; 
    ctx.lineWidth = 1/scale; // Mantiene la linea sottile anche con lo zoom
    for(let x=0; x<=W; x+=10) { // x+=10 definisce la densità della griglia
        ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); 
    }
    for(let y=0; y<=H; y+=10) { 
        ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); 
    }
    // ------------------------

    for(let b of blocks) {
        if(!cache[b.img]) { let img = new Image(); img.src = b.img; cache[b.img] = img; }
        if(cache[b.img].complete) ctx.drawImage(cache[b.img], b.x, b.y, b.w, b.h);
    }
    ctx.restore();
}

function loop() { draw(); requestAnimationFrame(loop); }
loop();

// ZOOM & PAN
let dragging = false, lx = 0, ly = 0, pinchDist = 0, pinchScale = 1;
c.addEventListener("mousedown", e => { dragging = true; lx = e.clientX; ly = e.clientY; });
window.addEventListener("mousemove", e => { if(dragging) { ox += e.clientX - lx; oy += e.clientY - ly; lx = e.clientX; ly = e.clientY; } });
window.addEventListener("mouseup", () => dragging = false);
c.addEventListener("wheel", e => { e.preventDefault(); scale *= e.deltaY < 0 ? 1.1 : 0.9; scale = Math.max(0.1, Math.min(50, scale)); }, {passive: false});

c.addEventListener("touchstart", e => {
    if(e.touches.length === 1) { dragging = true; lx = e.touches[0].clientX; ly = e.touches[0].clientY; }
    else if(e.touches.length === 2) { pinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); pinchScale = scale; }
}, {passive: true});
c.addEventListener("touchmove", e => {
    if(e.touches.length === 1 && dragging) { ox += e.touches[0].clientX - lx; oy += e.touches[0].clientY - ly; lx = e.touches[0].clientX; ly = e.touches[0].clientY; }
    else if(e.touches.length === 2) { 
        const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        scale = Math.max(0.1, Math.min(50, pinchScale * (d / pinchDist)));
    }
}, {passive: false});

document.getElementById("resetBtn").onclick = () => { scale = 1; ox = (c.width - W)/2; oy = (c.height - H)/2; };
window.addEventListener("resize", resize);
</script>
</body>
</html>
